<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Defter</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1c1917">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class' }</script>
<style>
  body { font-family: ui-sans-serif, system-ui, sans-serif; }
  .kat-gunluk { background:#fef3c7; color:#92400e; }
  .kat-ruya   { background:#ddd6fe; color:#5b21b6; }
  .kat-ilginc { background:#bfdbfe; color:#1e40af; }
  .dark .kat-gunluk { background:#422006; color:#fcd34d; }
  .dark .kat-ruya   { background:#2e1065; color:#c4b5fd; }
  .dark .kat-ilginc { background:#1e3a8a; color:#93c5fd; }
  .zaman-rozet { background:#f3f4f6; color:#4b5563; }
  .dark .zaman-rozet { background:#374151; color:#d1d5db; }
  mark { background:#fde68a; padding:0 2px; border-radius:2px; }
  .dark mark { background:#92400e; color:#fef3c7; }
  .besin-chip { transition:all .15s; }
  .besin-chip.aktif { background:#fbbf24; color:#1c1917; border-color:#f59e0b; }
  .dark .besin-chip.aktif { background:#f59e0b; color:#1c1917; }
  .sekme { border-bottom:2px solid transparent; transition:all .15s; }
  .sekme.aktif-gunluk { border-color:#f59e0b; color:#92400e; }
  .sekme.aktif-ruya   { border-color:#8b5cf6; color:#5b21b6; }
  .sekme.aktif-ilginc { border-color:#3b82f6; color:#1e40af; }
  .dark .sekme.aktif-gunluk { color:#fcd34d; }
  .dark .sekme.aktif-ruya   { color:#c4b5fd; }
  .dark .sekme.aktif-ilginc { color:#93c5fd; }
  .taslak-nokta { display:inline-block; width:6px; height:6px; border-radius:50%; background:#f59e0b; margin-left:4px; vertical-align:middle; }
  .taslak-indikator { opacity:0; transition:opacity .3s; font-size:11px; color:#78716c; }
  .taslak-indikator.gorunur { opacity:1; }
  @keyframes mindblow-shine { 0% { background-position:-200% 0; } 100% { background-position:200% 0; } }
  .mindblow-btn {
    background:linear-gradient(110deg,#10b981,#3b82f6 50%,#8b5cf6);
    background-size:200% 100%;
    color:white; font-weight:600;
    padding:9px 16px; border-radius:12px;
    box-shadow:0 4px 14px rgba(16,185,129,.35);
    animation:mindblow-shine 4s linear infinite;
    transition:transform .15s; display:inline-flex; align-items:center; gap:7px;
    font-size:13px; border:none; cursor:pointer;
  }
  .mindblow-btn:hover { transform:translateY(-1px) scale(1.02); }
  .acc-baslik { cursor:pointer; user-select:none; padding:10px 12px;
                display:flex; align-items:center; justify-content:space-between;
                font-size:13px; font-weight:600; }
  .acc-baslik:hover { background:rgba(245,158,11,.06); }
  .dark .acc-baslik:hover { background:rgba(245,158,11,.1); }
  .acc-ok { transition:transform .2s; font-size:10px; color:#a8a29e; }
  .acc-acik .acc-ok { transform:rotate(90deg); }
  .acc-icerik { display:none; padding:0 12px 12px; font-size:13px; }
  .acc-acik .acc-icerik { display:block; }
  .acc-dolu-rozet { font-size:9px; padding:1px 6px; border-radius:8px;
                    background:#fbbf24; color:#1c1917; margin-left:6px; }
  .dark .acc-dolu-rozet { background:#f59e0b; }
  .gv-row { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
  .gv-label { font-size:11px; color:#78716c; text-transform:uppercase; letter-spacing:.3px; margin-bottom:4px; display:block; }
  .gv-opt { padding:4px 10px; border:1px solid #e7e5e4; border-radius:14px;
            background:white; font-size:12px; cursor:pointer; transition:all .12s; }
  .dark .gv-opt { background:#292524; border-color:#44403c; color:#d6d3d1; }
  .gv-opt:hover { border-color:#f59e0b; }
  .gv-opt.aktif { background:#fbbf24; color:#1c1917; border-color:#f59e0b; }
  .dark .gv-opt.aktif { background:#f59e0b; color:#1c1917; }
  .gv-input { width:100%; padding:6px 10px; border-radius:6px; border:1px solid #e7e5e4; background:white; font-size:13px; }
  .dark .gv-input { background:#292524; border-color:#44403c; color:#f5f5f4; }
  .gv-mini { padding:4px 8px; font-size:12px; width:auto; }
  .gv-grup { margin-bottom:12px; padding-bottom:10px; border-bottom:1px dashed #e7e5e4; }
  .dark .gv-grup { border-bottom-color:#44403c; }
  .gv-grup:last-child { border-bottom:none; padding-bottom:0; margin-bottom:0; }
  .ogun-karti { background:rgba(245,158,11,.05); border:1px solid #fde68a; border-radius:8px; padding:10px; margin-bottom:8px; position:relative; }
  .dark .ogun-karti { background:rgba(245,158,11,.08); border-color:#78350f; }
  .ogun-sil { position:absolute; top:4px; right:6px; font-size:12px; color:#a8a29e; cursor:pointer; }
  .ogun-sil:hover { color:#ef4444; }
  .a2-pf { background:#fff; border-color:#e5e5e5; color:#525252; }
  .dark .a2-pf { background:#27272a; border-color:#3f3f46; color:#a1a1aa; }
  .a2-pf.aktif { background:#f59e0b; border-color:#f59e0b; color:#fff; }
  .dark .a2-pf.aktif { background:#f59e0b; border-color:#f59e0b; color:#18181b; }
  .a2-sf { background:#fff; border-color:#e5e5e5; color:#525252; }
  .dark .a2-sf { background:#27272a; border-color:#3f3f46; color:#a1a1aa; }
  .a2-sf.aktif { background:#3b82f6; border-color:#3b82f6; color:#fff; }
  .dark .a2-sf.aktif { background:#3b82f6; border-color:#3b82f6; color:#18181b; }
  .a2-kart { transition:all .15s; }
  .a2-kart:hover { transform:translateY(-1px); }
  /* Mobile: collapse to single col with bottom nav */
  @media (max-width: 768px) {
    .mob-panel { display:none; }
    .mob-panel.active { display:block; }
    .desktop-3col { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body class="bg-stone-50 dark:bg-zinc-900 text-stone-800 dark:text-stone-100 min-h-screen">

<!-- HEADER -->
<header class="border-b border-stone-200 dark:border-zinc-800 sticky top-0 bg-stone-50/90 dark:bg-zinc-900/90 backdrop-blur z-20">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-2 flex-wrap">
    <div class="flex-1 min-w-0">
      <h1 class="text-xl font-serif font-semibold">Defter</h1>
    </div>
    <input id="arama" type="search" placeholder="Ara…" class="px-3 py-1.5 rounded-lg bg-white dark:bg-zinc-800 border border-stone-200 dark:border-zinc-700 text-sm w-40 sm:w-56 focus:outline-none focus:ring-2 focus:ring-amber-400">
    <button onclick="disaAktar()" title="JSON dışa aktar" class="p-2 rounded-lg hover:bg-stone-200 dark:hover:bg-zinc-800 text-sm">⬇️</button>
    <button onclick="document.getElementById('iceAktarInput').click()" title="JSON içe aktar" class="p-2 rounded-lg hover:bg-stone-200 dark:hover:bg-zinc-800 text-sm">⬆️</button>
    <input id="iceAktarInput" type="file" accept=".json" class="hidden" onchange="iceAktar(event)">
    <button id="temaBtn" class="p-2 rounded-lg hover:bg-stone-200 dark:hover:bg-zinc-800">🌓</button>
    <!-- Mobile nav buttons -->
    <div class="md:hidden flex gap-1 w-full mt-1">
      <button onclick="mobPanel('takvim')" class="mob-nav-btn flex-1 py-1 text-xs rounded bg-stone-200 dark:bg-zinc-700">📅 Takvim</button>
      <button onclick="mobPanel('editor')" class="mob-nav-btn flex-1 py-1 text-xs rounded bg-amber-400 text-stone-900">✏️ Yaz</button>
      <button onclick="mobPanel('gunveri')" class="mob-nav-btn flex-1 py-1 text-xs rounded bg-stone-200 dark:bg-zinc-700">📊 Veri</button>
      <button onclick="analiz2Goster()" class="mob-nav-btn flex-1 py-1 text-xs rounded bg-emerald-600 text-white">🔬 Analiz</button>
    </div>
  </div>
</header>

<!-- MAIN 3-COL -->
<main class="max-w-7xl mx-auto px-4 py-4 grid grid-cols-1 lg:grid-cols-[260px_1fr_300px] gap-4 desktop-3col">

  <!-- SOL: Takvim + Etiketler -->
  <aside id="panelTakvim" class="mob-panel active space-y-4">
    <div class="bg-white dark:bg-zinc-800 rounded-xl p-4 border border-stone-200 dark:border-zinc-700">
      <div class="flex items-center justify-between mb-2">
        <button onclick="takvimGez(-1)" class="px-2 py-1 hover:bg-stone-100 dark:hover:bg-zinc-700 rounded">‹</button>
        <div class="text-sm font-medium" id="takvimBaslik"></div>
        <button onclick="takvimGez(1)" class="px-2 py-1 hover:bg-stone-100 dark:hover:bg-zinc-700 rounded">›</button>
      </div>
      <div id="takvim" class="grid grid-cols-7 gap-1 text-center text-xs"></div>
      <div class="mt-2 flex flex-wrap gap-1" id="yilSec"></div>
    </div>
    <div class="bg-white dark:bg-zinc-800 rounded-xl p-4 border border-stone-200 dark:border-zinc-700">
      <h3 class="text-xs font-semibold uppercase tracking-wide text-stone-500 mb-2">Etiketler</h3>
      <div id="etiketlerPaneli" class="flex flex-wrap gap-1.5"></div>
    </div>
    <div class="bg-white dark:bg-zinc-800 rounded-xl p-4 border border-stone-200 dark:border-zinc-700 max-h-60 overflow-y-auto">
      <h3 class="text-xs font-semibold uppercase tracking-wide text-stone-500 mb-2">Tüm Günler</h3>
      <div id="tumGunler" class="space-y-1 text-sm"></div>
    </div>
  </aside>

  <!-- ORTA: Editör -->
  <section id="panelEditor" class="mob-panel active space-y-4">
    <!-- Seçimler -->
    <div class="bg-white dark:bg-zinc-800 rounded-xl p-4 border border-stone-200 dark:border-zinc-700">
      <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
        <h2 id="gunBaslik" class="text-base font-serif font-semibold"></h2>
        <button onclick="analiz2Goster()" class="mindblow-btn"><span>🔬</span><span>Analiz 2</span></button>
      </div>
      <div class="grid grid-cols-2 gap-2 mb-3 text-xs">
        <select id="duygu" class="bg-stone-50 dark:bg-zinc-900 border border-stone-200 dark:border-zinc-700 rounded-lg px-2 py-2"></select>
        <select id="enerji" class="bg-stone-50 dark:bg-zinc-900 border border-stone-200 dark:border-zinc-700 rounded-lg px-2 py-2"></select>
      </div>
      <div>
        <h4 class="text-xs font-semibold uppercase tracking-wide text-stone-500 mb-2">Beslenme (hızlı)</h4>
        <div id="beslenmeChipler" class="flex flex-wrap gap-1.5"></div>
      </div>
    </div>

    <!-- Not editörü + sekmeleri -->
    <div class="bg-white dark:bg-zinc-800 rounded-xl border border-stone-200 dark:border-zinc-700">
      <div class="flex border-b border-stone-200 dark:border-zinc-700 px-2 overflow-x-auto">
        <button onclick="sekmeAc('gunluk')" id="sekmeBtn-gunluk" class="sekme px-4 py-3 text-sm font-medium flex items-center gap-1 whitespace-nowrap">
          📔 Günlük <span id="sayac-gunluk" class="text-xs text-stone-400">0</span><span id="taslakNokta-gunluk" class="taslak-nokta hidden"></span>
        </button>
        <button onclick="sekmeAc('ruya')" id="sekmeBtn-ruya" class="sekme px-4 py-3 text-sm font-medium flex items-center gap-1 whitespace-nowrap">
          💭 Rüya <span id="sayac-ruya" class="text-xs text-stone-400">0</span><span id="taslakNokta-ruya" class="taslak-nokta hidden"></span>
        </button>
        <button onclick="sekmeAc('ilginc')" id="sekmeBtn-ilginc" class="sekme px-4 py-3 text-sm font-medium flex items-center gap-1 whitespace-nowrap">
          ✨ İlginç <span id="sayac-ilginc" class="text-xs text-stone-400">0</span><span id="taslakNokta-ilginc" class="taslak-nokta hidden"></span>
        </button>
      </div>
      <div class="p-4">
        <div id="notlar" class="space-y-3 mb-4"></div>
        <div class="border-t border-stone-200 dark:border-zinc-700 pt-4 space-y-2">
          <div class="flex items-center justify-between mb-1">
            <span class="text-xs text-stone-500">Yeni <b id="yeniKategoriEtiket"></b>
              <span id="taslakIndikator" class="taslak-indikator ml-2">💾 taslak kaydedildi</span>
            </span>
            <select id="zaman" class="bg-stone-50 dark:bg-zinc-900 border border-stone-200 dark:border-zinc-700 rounded-lg px-3 py-1.5 text-xs">
              <option value="">— zaman —</option>
              <option value="sabah">🌅 Sabah</option>
              <option value="oglen">☀️ Öğlen</option>
              <option value="aksam">🌙 Akşam</option>
            </select>
          </div>
          <input id="yeniEtiketler" placeholder="etiketler: iş, kahve, yağmur" class="w-full bg-stone-50 dark:bg-zinc-900 border border-stone-200 dark:border-zinc-700 rounded-lg px-3 py-2 text-sm">
          <textarea id="yeniIcerik" rows="4" class="w-full bg-stone-50 dark:bg-zinc-900 border border-stone-200 dark:border-zinc-700 rounded-lg px-3 py-2 text-sm font-serif resize-none"></textarea>
          <div class="flex justify-end gap-2">
            <button onclick="taslakSil()" id="taslakSilBtn" class="px-3 py-2 rounded-lg text-xs text-stone-500 hover:bg-stone-100 dark:hover:bg-zinc-700 hidden">Taslağı sil</button>
            <button onclick="notKaydet()" class="px-4 py-2 rounded-lg bg-stone-800 dark:bg-amber-500 text-white dark:text-stone-900 text-sm font-medium hover:opacity-90">Kaydet</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Arama sonuçları -->
    <div id="sonucPanel" class="hidden bg-white dark:bg-zinc-800 rounded-xl p-4 border border-stone-200 dark:border-zinc-700"></div>
  </section>

  <!-- SAĞ: Gün verileri -->
  <aside id="panelGunveri" class="mob-panel space-y-4">
    <div class="bg-white dark:bg-zinc-800 rounded-xl border border-stone-200 dark:border-zinc-700">
      <div class="px-4 py-3 border-b border-stone-200 dark:border-zinc-700 flex items-center justify-between">
        <h3 class="text-sm font-semibold">📊 Gün Verileri</h3>
        <span id="gvInd" class="taslak-indikator">💾</span>
      </div>
      <div id="gvAcc"></div>
    </div>
  </aside>
</main>

<!-- ANALİZ 2 MODALİ -->
<div id="analiz2Panel" class="hidden fixed inset-0 z-50 flex items-start justify-center pt-4 px-4 pb-8 overflow-y-auto" style="background:rgba(0,0,0,.6)">
  <div class="bg-white dark:bg-zinc-800 rounded-2xl shadow-2xl w-full max-w-4xl">
    <div class="sticky top-0 bg-white dark:bg-zinc-800 border-b border-stone-200 dark:border-zinc-700 px-6 py-4 flex items-center justify-between rounded-t-2xl z-10">
      <div>
        <h2 class="text-base font-semibold flex items-center gap-2">🔬 Analiz 2 — Otomatik Desen Tarayıcısı</h2>
        <p class="text-xs text-stone-500 dark:text-stone-400 mt-0.5" id="analiz2Ozet">Yükleniyor…</p>
      </div>
      <button onclick="document.getElementById('analiz2Panel').classList.add('hidden')" class="text-stone-400 hover:text-stone-700 dark:hover:text-stone-200 text-2xl leading-none">×</button>
    </div>

    <!-- Zincir Analizi -->
    <div id="zincirBolum" class="hidden px-6 py-5 border-b border-stone-200 dark:border-zinc-700 bg-gradient-to-br from-emerald-50 to-blue-50 dark:from-emerald-950/30 dark:to-blue-950/30">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-semibold text-emerald-800 dark:text-emerald-300">🔗 En Güçlü Döngü</h3>
        <span id="donguRozet" class="text-xs px-2 py-0.5 rounded-full bg-emerald-100 dark:bg-emerald-900/50 text-emerald-700 dark:text-emerald-300"></span>
      </div>
      <div id="zincirGorsel" class="flex flex-wrap items-center gap-1 mb-3"></div>
      <p id="zincirOzet" class="text-xs text-stone-600 dark:text-stone-400 leading-relaxed"></p>
    </div>
    <!-- Zincir Analizi -->
    <div id="zincirBolum" class="hidden px-6 py-5 border-b border-stone-200 dark:border-zinc-700 bg-gradient-to-br from-emerald-50 to-blue-50 dark:from-emerald-950/30 dark:to-blue-950/30">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-semibold text-emerald-800 dark:text-emerald-300">🔗 En Güçlü Döngü</h3>
        <span id="donguRozet" class="text-xs px-2 py-0.5 rounded-full bg-emerald-100 dark:bg-emerald-900/50 text-emerald-700 dark:text-emerald-300"></span>
      </div>
      <div id="zincirGorsel" class="flex flex-wrap items-center gap-1 mb-3"></div>
      <p id="zincirOzet" class="text-xs text-stone-600 dark:text-stone-400 leading-relaxed"></p>
    </div>
    <!-- Filtreler -->
    <div class="px-6 py-4 border-b border-stone-200 dark:border-zinc-700 space-y-3 bg-stone-50 dark:bg-zinc-900/50">
      <div>
        <div class="flex items-center justify-between text-sm mb-1">
          <label class="font-medium">Sıklık eşiği</label>
          <span class="font-mono text-amber-600 dark:text-amber-400" id="a2YuzdeVal">%60</span>
        </div>
        <input type="range" id="a2Yuzde" min="30" max="100" step="1" value="60" class="w-full accent-amber-500" oninput="analiz2Filtrele()">
        <div class="flex justify-between text-xs text-stone-400 mt-0.5"><span>%30 (keşif)</span><span>%100 (kesin)</span></div>
      </div>
      <div>
        <div class="flex items-center justify-between text-sm mb-1">
          <label class="font-medium">Min. örnek</label>
          <span class="font-mono text-amber-600 dark:text-amber-400" id="a2OrnekVal">5</span>
        </div>
        <input type="range" id="a2Ornek" min="3" max="100" step="1" value="5" class="w-full accent-amber-500" oninput="analiz2Filtrele()">
      </div>
      <div>
        <div class="flex items-center justify-between text-sm mb-1">
          <label class="font-medium">Kök neden eşiği</label>
          <span class="font-mono text-amber-600 dark:text-amber-400" id="a2KokVal">%40</span>
        </div>
        <input type="range" id="a2Kok" min="0" max="100" step="5" value="40" class="w-full accent-amber-500" oninput="analiz2Filtrele()">
      </div>
      <div class="flex flex-wrap items-center gap-2 text-sm">
        <span class="font-medium">Pencere:</span>
        <button class="a2-pf aktif px-2 py-1 rounded border text-xs" data-p="hepsi" onclick="a2PencereSec('hepsi')">Hepsi</button>
        <button class="a2-pf px-2 py-1 rounded border text-xs" data-p="T" onclick="a2PencereSec('T')">Aynı gün</button>
        <button class="a2-pf px-2 py-1 rounded border text-xs" data-p="T-1" onclick="a2PencereSec('T-1')">Ertesi gün</button>
        <button class="a2-pf px-2 py-1 rounded border text-xs" data-p="T-3" onclick="a2PencereSec('T-3')">Son 3 gün</button>
        <button class="a2-pf px-2 py-1 rounded border text-xs" data-p="T-7c" onclick="a2PencereSec('T-7c')">Haftalık 4+</button>
        <span class="ml-auto text-xs text-stone-500" id="a2Sayac"></span>
      </div>
      <div class="flex flex-wrap items-center gap-2 text-sm">
        <span class="font-medium">Sonuç:</span>
        <button class="a2-sf aktif px-2 py-1 rounded border text-xs" data-s="hepsi" onclick="a2SonucSec('hepsi')">Hepsi</button>
        <button class="a2-sf px-2 py-1 rounded border text-xs" data-s="duygu" onclick="a2SonucSec('duygu')">Duygu</button>
        <button class="a2-sf px-2 py-1 rounded border text-xs" data-s="enerji" onclick="a2SonucSec('enerji')">Enerji</button>
        <button class="a2-sf px-2 py-1 rounded border text-xs" data-s="aci" onclick="a2SonucSec('aci')">Ağrı</button>
        <button class="a2-sf px-2 py-1 rounded border text-xs" data-s="uyku" onclick="a2SonucSec('uyku')">Uyku</button>
      </div>
    </div>
    <div id="analiz2Liste" class="px-6 py-4 space-y-3 max-h-[60vh] overflow-y-auto"></div>
  </div>
</div>

<script>
// =====================================================================
// SABİTLER
// =====================================================================
const DUYGULAR    = ['','huzurlu','mutlu','nötr','kaygılı','üzgün','öfkeli','bitkin'];
const ENERJILER   = ['','yüksek','orta','düşük'];
const BESLENMELER = [
  {ad:'ev yemeği',emoji:'🏠'},{ad:'dışarıda yemek',emoji:'🍽️'},
  {ad:'fast food',emoji:'🍔'},{ad:'atıştırmalık',emoji:'🍿'},
  {ad:'hafif',emoji:'🥗'},{ad:'kafein',emoji:'☕'},
  {ad:'alkol',emoji:'🍷'},{ad:'şekerli içecek',emoji:'🥤'},
];
const ZAMAN_ETIKET = {sabah:'🌅 Sabah',oglen:'☀️ Öğlen',aksam:'🌙 Akşam'};
const KAT_AD      = {gunluk:'Günlük',ruya:'Rüya',ilginc:'İlginç Olay'};
const KAT_PH      = {
  gunluk:'Bugün ne yaşadın, ne hissettin…',
  ruya:'Rüyanda ne gördün?',
  ilginc:'Bugünün ilginç anı…',
};
const UYKU_YATIS  = ['erken','normal','geç'];
const OGUN_TIPLER = ['kahvaltı','öğle','akşam','ara öğün'];

// =====================================================================
// IndexedDB KATMANI
// =====================================================================
const IDB = (() => {
  const DB_NAME = 'defter', DB_VER = 1;
  let _db = null;

  function open() {
    if (_db) return Promise.resolve(_db);
    return new Promise((res, rej) => {
      const req = indexedDB.open(DB_NAME, DB_VER);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        // notlar
        if (!db.objectStoreNames.contains('notlar')) {
          const ns = db.createObjectStore('notlar', {keyPath:'id', autoIncrement:true});
          ns.createIndex('tarih','tarih',{unique:false});
          ns.createIndex('kategori','kategori',{unique:false});
        }
        // secimler: keyPath = tarih
        if (!db.objectStoreNames.contains('secimler'))
          db.createObjectStore('secimler', {keyPath:'tarih'});
        // gun_verileri: keyPath = tarih
        if (!db.objectStoreNames.contains('gun_verileri'))
          db.createObjectStore('gun_verileri', {keyPath:'tarih'});
        // taslaklar: keyPath = [tarih, kategori]
        if (!db.objectStoreNames.contains('taslaklar'))
          db.createObjectStore('taslaklar', {keyPath:['tarih','kategori']});
      };
      req.onsuccess  = e => { _db = e.target.result; res(_db); };
      req.onerror    = e => rej(e.target.error);
    });
  }

  function tx(stores, mode='readonly') {
    return open().then(db => db.transaction(stores, mode));
  }

  function wrap(req) {
    return new Promise((res, rej) => {
      req.onsuccess = e => res(e.target.result);
      req.onerror   = e => rej(e.target.error);
    });
  }

  async function get(store, key) {
    const t = await tx(store);
    return wrap(t.objectStore(store).get(key));
  }
  async function getAll(store) {
    const t = await tx(store);
    return wrap(t.objectStore(store).getAll());
  }
  async function getAllByIndex(store, idx, val) {
    const t = await tx(store);
    return wrap(t.objectStore(store).index(idx).getAll(val));
  }
  async function put(store, obj) {
    const t = await tx(store, 'readwrite');
    return wrap(t.objectStore(store).put(obj));
  }
  async function del(store, key) {
    const t = await tx(store, 'readwrite');
    return wrap(t.objectStore(store).delete(key));
  }
  async function getAllKeys(store) {
    const t = await tx(store);
    return wrap(t.objectStore(store).getAllKeys());
  }
  return { get, getAll, getAllByIndex, put, del, getAllKeys, open };
})();

// =====================================================================
// VERİ API (IndexedDB üstü)
// =====================================================================
async function gunGetir(tarih) {
  const [notlar, secim, gv, tum_taslaklar] = await Promise.all([
    IDB.getAllByIndex('notlar','tarih', tarih),
    IDB.get('secimler', tarih),
    IDB.get('gun_verileri', tarih),
    IDB.getAll('taslaklar'),
  ]);
  const taslaklar = {gunluk:{icerik:'',etiketler:'',zaman:''},ruya:{icerik:'',etiketler:'',zaman:''},ilginc:{icerik:'',etiketler:'',zaman:''}};
  for (const t of tum_taslaklar) {
    if (t.tarih === tarih) taslaklar[t.kategori] = {icerik:t.icerik||'',etiketler:(t.etiketler||[]).join(', '),zaman:t.zaman||''};
  }
  return {
    notlar: notlar || [],
    secim: secim || {duygu:'', enerji:'', beslenme:[]},
    gun_verileri: gv || {uyku:{},ogunler:[],icecek:{},spor:{},saglik:{},ekran:{},sosyal:{}},
    taslaklar,
  };
}

async function secimKaydetDB(tarih, duygu, enerji, beslenme) {
  await IDB.put('secimler', {tarih, duygu:duygu||null, enerji:enerji||null, beslenme: beslenme || []});
}
async function gunVeriKaydet(tarih, veri) {
  await IDB.put('gun_verileri', {tarih, ...veri});
}
async function taslakKaydetDB(tarih, kategori, icerik, etiketler, zaman) {
  await IDB.put('taslaklar', {tarih, kategori, icerik, etiketler, zaman});
}
async function notKaydetDB(tarih, kategori, icerik, etiketler, zaman) {
  const olusturulma = new Date().toISOString();
  await IDB.put('notlar', {tarih, kategori, icerik, etiketler: etiketler||[], zaman: zaman||null, olusturulma});
}
async function notSilDB(id) {
  await IDB.del('notlar', id);
}

async function notluGunler() {
  const tum = await IDB.getAll('notlar');
  const map = {};
  for (const n of tum) {
    if (!map[n.tarih]) map[n.tarih] = {tarih: n.tarih, adet:0, onizleme:''};
    map[n.tarih].adet++;
    if (!map[n.tarih].onizleme && n.icerik) map[n.tarih].onizleme = n.icerik.slice(0,60);
  }
  return Object.values(map).sort((a,b) => b.tarih.localeCompare(a.tarih));
}

async function araDB(q) {
  if (!q) return [];
  const tum = await IDB.getAll('notlar');
  const ql = q.toLowerCase();
  return tum.filter(n => n.icerik.toLowerCase().includes(ql))
            .sort((a,b) => b.tarih.localeCompare(a.tarih))
            .map(n => ({...n, parca: vurgula(n.icerik, q)}));
}

async function etiketlerDB() {
  const tum = await IDB.getAll('notlar');
  const sayim = {};
  for (const n of tum) for (const e of (n.etiketler||[])) { sayim[e] = (sayim[e]||0)+1; }
  return Object.entries(sayim).sort((a,b)=>b[1]-a[1]).map(([ad,adet])=>({ad,adet}));
}

async function etiketNotlar(ad) {
  const tum = await IDB.getAll('notlar');
  return tum.filter(n=>(n.etiketler||[]).includes(ad)).sort((a,b)=>b.tarih.localeCompare(a.tarih));
}

// JSON dışa / içe aktar
async function disaAktar() {
  const [notlar, secimler, gvAll, taslaklar] = await Promise.all([
    IDB.getAll('notlar'), IDB.getAll('secimler'),
    IDB.getAll('gun_verileri'), IDB.getAll('taslaklar'),
  ]);
  const json = JSON.stringify({notlar, secimler, gun_verileri: gvAll, taslaklar, versiyon:3, tarih: new Date().toISOString()}, null, 2);
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(json);
  a.download = `defter-yedek-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

async function iceAktar(e) {
  const file = e.target.files[0];
  if (!file) return;
  const text = await file.text();
  let data;
  try { data = JSON.parse(text); } catch { alert('Geçersiz JSON dosyası.'); return; }
  if (!confirm(`${(data.notlar||[]).length} not, ${(data.secimler||[]).length} seçim içe aktarılacak. Devam?`)) return;
  const writes = [];
  for (const n of (data.notlar||[])) writes.push(IDB.put('notlar', n));
  for (const s of (data.secimler||[])) writes.push(IDB.put('secimler', s));
  for (const g of (data.gun_verileri||[])) writes.push(IDB.put('gun_verileri', g));
  for (const t of (data.taslaklar||[])) writes.push(IDB.put('taslaklar', t));
  await Promise.all(writes);
  alert('İçe aktarma tamamlandı!');
  gunYukle(seciliTarih); takvimCiz(); tumGunleriYukle(); etiketleriYukle();
  e.target.value = '';
}

// =====================================================================
// YARDIMCILAR
// =====================================================================
function esc(s) { return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function tarihGoster(t) {
  return new Date(t+'T12:00:00').toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
function vurgula(metin, q) {
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return esc(metin.slice(0,300)).replace(re,'<mark>$1</mark>');
}

function taslakNoktalariniGuncelle() {
  ['gunluk','ruya','ilginc'].forEach(k => {
    const t = taslaklarLokal[k];
    const dolu = (t.icerik&&t.icerik.trim())||(t.etiketler&&t.etiketler.trim())||(t.zaman&&t.zaman.trim());
    document.getElementById(`taslakNokta-${k}`).classList.toggle('hidden', !dolu);
  });
  const t = taslaklarLokal[aktifSekme];
  const dolu = (t.icerik&&t.icerik.trim())||(t.etiketler&&t.etiketler.trim())||(t.zaman&&t.zaman.trim());
  document.getElementById('taslakSilBtn').classList.toggle('hidden', !dolu);
}

function sekmeAc(kat) {
  if (sonGunData) {
    taslaklarLokal[aktifSekme] = {
      icerik: document.getElementById('yeniIcerik').value,
      etiketler: document.getElementById('yeniEtiketler').value,
      zaman: document.getElementById('zaman').value,
    };
  }
  aktifSekme = kat;
  localStorage.setItem('aktifSekme', kat);
  ['gunluk','ruya','ilginc'].forEach(k => {
    const btn = document.getElementById(`sekmeBtn-${k}`);
    btn.classList.remove('aktif-gunluk','aktif-ruya','aktif-ilginc');
    if (k===kat) btn.classList.add(`aktif-${k}`);
  });
  document.getElementById('yeniKategoriEtiket').textContent = KAT_AD[kat];
  document.getElementById('yeniIcerik').placeholder = KAT_PH[kat];
  const t = taslaklarLokal[kat]||{};
  document.getElementById('yeniIcerik').value    = t.icerik||'';
  document.getElementById('yeniEtiketler').value = t.etiketler||'';
  document.getElementById('zaman').value         = t.zaman||'';
  if (sonGunData) notlariCiz(sonGunData);
  taslakNoktalariniGuncelle();
}

function taslakKaydetGec() {
  clearTimeout(taslakTimer);
  taslakTimer = setTimeout(async () => {
    const icerik   = document.getElementById('yeniIcerik').value;
    const etiketler = document.getElementById('yeniEtiketler').value;
    const zaman    = document.getElementById('zaman').value;
    taslaklarLokal[aktifSekme] = {icerik, etiketler, zaman};
    await taslakKaydetDB(seciliTarih, aktifSekme, icerik, etiketler.split(',').map(s=>s.trim()).filter(Boolean), zaman);
    const ind = document.getElementById('taslakIndikator');
    ind.classList.add('gorunur');
    setTimeout(() => ind.classList.remove('gorunur'), 1500);
    taslakNoktalariniGuncelle();
  }, 1500);
}
document.getElementById('yeniIcerik').addEventListener('input', taslakKaydetGec);
document.getElementById('yeniEtiketler').addEventListener('input', taslakKaydetGec);
document.getElementById('zaman').addEventListener('change', taslakKaydetGec);

async function taslakSil() {
  if (!confirm('Bu sekmedeki taslak silinsin mi?')) return;
  document.getElementById('yeniIcerik').value    = '';
  document.getElementById('yeniEtiketler').value = '';
  document.getElementById('zaman').value         = '';
  taslaklarLokal[aktifSekme] = {icerik:'',etiketler:'',zaman:''};
  await taslakKaydetDB(seciliTarih, aktifSekme, '', [], '');
  taslakNoktalariniGuncelle();
}

function notlariCiz(data) {
  const liste = document.getElementById('notlar');
  const filtre = data.notlar.filter(n=>n.kategori===aktifSekme);
  ['gunluk','ruya','ilginc'].forEach(k =>
    document.getElementById(`sayac-${k}`).textContent = data.notlar.filter(n=>n.kategori===k).length
  );
  if (!filtre.length) {
    liste.innerHTML = `<p class="text-sm text-stone-400 italic">Bu gün için ${KAT_AD[aktifSekme].toLowerCase()} notu yok.</p>`;
    return;
  }
  liste.innerHTML = filtre.map(n=>`
    <div class="group p-3 rounded-lg bg-stone-50 dark:bg-zinc-900 border border-stone-100 dark:border-zinc-700">
      <div class="flex items-center justify-between mb-1 gap-2 flex-wrap">
        <div class="flex items-center gap-1.5">
          <span class="text-xs px-2 py-0.5 rounded-full kat-${n.kategori}">${KAT_AD[n.kategori]}</span>
          ${n.zaman?`<span class="text-xs px-2 py-0.5 rounded-full zaman-rozet">${ZAMAN_ETIKET[n.zaman]}</span>`:''}
        </div>
        <button onclick="notSil(${n.id})" class="text-xs text-stone-400 hover:text-red-500 opacity-0 group-hover:opacity-100">sil</button>
      </div>
      <p class="text-sm font-serif whitespace-pre-wrap leading-relaxed">${esc(n.icerik)}</p>
      ${n.etiketler&&n.etiketler.length?`<div class="mt-2 flex flex-wrap gap-1">${n.etiketler.map(e=>`<span class="text-xs px-1.5 py-0.5 rounded bg-stone-200 dark:bg-zinc-700 cursor-pointer" onclick="etiketAc('${esc(e)}')">#${esc(e)}</span>`).join('')}</div>`:''}
    </div>`).join('');
}

async function gunYukle(tarih) {
  seciliTarih = tarih;
  const r = await gunGetir(tarih);
  sonGunData = r;
  document.getElementById('gunBaslik').textContent = tarihGoster(tarih);
  document.getElementById('duygu').value  = r.secim.duygu  || '';
  document.getElementById('enerji').value = r.secim.enerji || '';
  seciliBesinler = new Set(r.secim.beslenme||[]);
  besinChipleriGuncelle();
  taslaklarLokal = r.taslaklar;
  const t = taslaklarLokal[aktifSekme]||{};
  document.getElementById('yeniIcerik').value    = t.icerik||'';
  document.getElementById('yeniEtiketler').value = t.etiketler||'';
  document.getElementById('zaman').value         = t.zaman||'';
  notlariCiz(r);
  taslakNoktalariniGuncelle();
  gv = r.gun_verileri;
  if (!gv) gv = {uyku:{},ogunler:[],icecek:{},spor:{},saglik:{},ekran:{},sosyal:{}};
  if (!gv.ogunler) gv.ogunler = [];
  gvCiz();
  // Takvimi de yenile (seçili gün vurgusu)
  takvimCiz();
}

async function notKaydet() {
  const icerik = document.getElementById('yeniIcerik').value.trim();
  if (!icerik) return;
  const etiketler = document.getElementById('yeniEtiketler').value.split(',').map(s=>s.trim()).filter(Boolean);
  await notKaydetDB(seciliTarih, aktifSekme, icerik, etiketler, document.getElementById('zaman').value||null);
  document.getElementById('yeniIcerik').value    = '';
  document.getElementById('yeniEtiketler').value = '';
  document.getElementById('zaman').value         = '';
  taslaklarLokal[aktifSekme] = {icerik:'',etiketler:'',zaman:''};
  await taslakKaydetDB(seciliTarih, aktifSekme, '', [], '');
  taslakNoktalariniGuncelle();
  gunYukle(seciliTarih); tumGunleriYukle(); etiketleriYukle();
}

async function notSil(id) {
  if (!confirm('Bu notu silmek istiyor musun?')) return;
  await notSilDB(id);
  gunYukle(seciliTarih); tumGunleriYukle(); etiketleriYukle();
}

async function takvimCiz() {
  const ilkGun = new Date(takvimYil, takvimAy, 1).getDay()||7;
  const gunSay = new Date(takvimYil, takvimAy+1, 0).getDate();
  document.getElementById('takvimBaslik').textContent = `${AYLAR[takvimAy]} ${takvimYil}`;
  const notGunler = await notluGunler();
  const dolu = new Set(notGunler.map(g=>g.tarih));
  let html = ['Pt','Sa','Ça','Pe','Cu','Ct','Pz'].map(g=>`<div class="text-stone-400 font-medium py-1">${g}</div>`).join('');
  for (let i=1; i<ilkGun; i++) html += `<div></div>`;
  for (let g=1; g<=gunSay; g++) {
    const ts = `${takvimYil}-${String(takvimAy+1).padStart(2,'0')}-${String(g).padStart(2,'0')}`;
    const aktif = ts===seciliTarih, bugun = ts===bugunStr, doluMu = dolu.has(ts);
    html += `<button onclick="gunYukle('${ts}')" class="aspect-square rounded ${aktif?'bg-amber-400 text-stone-900 font-bold':doluMu?'bg-amber-100 dark:bg-amber-900/40':'hover:bg-stone-100 dark:hover:bg-zinc-700'} ${bugun&&!aktif?'ring-1 ring-amber-400':''}">${g}</button>`;
  }
  document.getElementById('takvim').innerHTML = html;
  const yillar = [...new Set(notGunler.map(g=>g.tarih.slice(0,4)))].sort();
  const su = new Date().getFullYear();
  if (!yillar.includes(String(su))) yillar.push(String(su));
  document.getElementById('yilSec').innerHTML = yillar.map(y=>
    `<button onclick="yilGit(${y})" class="text-xs px-1.5 py-0.5 rounded ${y==takvimYil?'bg-stone-800 text-white dark:bg-amber-500 dark:text-stone-900':'hover:bg-stone-200 dark:hover:bg-zinc-700'}">${y}</button>`
  ).join('');
}
function takvimGez(d) { takvimAy+=d; if(takvimAy<0){takvimAy=11;takvimYil--;}if(takvimAy>11){takvimAy=0;takvimYil++;} takvimCiz(); }
function yilGit(y) { takvimYil=y; takvimCiz(); }

function gvDoluMu(bolum) {
  const v = gv[bolum];
  if (!v) return false;
  if (Array.isArray(v)) return v.length>0;
  if (typeof v==='object') return Object.keys(v).some(k=>{
    const x=v[k];
    if(x===null||x===undefined||x===''||x===false)return false;
    if(Array.isArray(x))return x.length>0;
    if(typeof x==='object')return Object.keys(x).length>0;
    return true;
  });
  return false;
}

function gvCiz() {
  const bolumler = [
    {k:'uyku',    ad:'🛌 Uyku',        fn:gvCizUyku},
    {k:'ogunler', ad:'🍽️ Yemek',        fn:gvCizYemek},
    {k:'icecek',  ad:'☕ İçecek & Su',  fn:gvCizIcecek},
    {k:'spor',    ad:'💪 Spor',        fn:gvCizSpor},
    {k:'saglik',  ad:'🩺 Sağlık',      fn:gvCizSaglik},
    {k:'ekran',   ad:'📺 Ekran',       fn:gvCizEkran},
    {k:'sosyal',  ad:'👥 Sosyal',      fn:gvCizSosyal},
  ];
  const c = document.getElementById('gvAcc');
  c.innerHTML = bolumler.map(b=>`
    <div class="border-t border-stone-200 dark:border-zinc-700 ${accAcik[b.k]?'acc-acik':''}" id="acc-${b.k}">
      <div class="acc-baslik" onclick="accTogle('${b.k}')">
        <span>${b.ad} ${gvDoluMu(b.k)?'<span class="acc-dolu-rozet">●</span>':''}</span>
        <span class="acc-ok">▶</span>
      </div>
      <div class="acc-icerik" id="acc-icerik-${b.k}"></div>
    </div>`).join('');
  bolumler.forEach(b => { const el=document.getElementById(`acc-icerik-${b.k}`); if(el) el.innerHTML=b.fn(); });
}

function accTogle(k) {
  accAcik[k]=!accAcik[k];
  localStorage.setItem('accAcik', JSON.stringify(accAcik));
  document.getElementById(`acc-${k}`)?.classList.toggle('acc-acik');
}

function gvKayitGec() {

const SONUC_ONEKLERI = ['duygu=','enerji=','aci_var','aci_bolge=','aci_siddet_','uyku_saat_','uyku_aralikli'];
const BLOK_PREFIXLERI = {
  aci:       ['aci_var','aci_bolge=','aci_siddet_'],
  uyku:      ['uyku_saat_','uyku_yatis=','uyku_kalkis=','uyku_aralikli'],
  alkol:     ['alkol_var','alkol_miktar_','secim_beslenme=alkol'],
  ogun:      ['ogun_sayisi_','ogun_gluten_var','ogun_seker_var','ogun_disarida_var','ogun_agir_var','ogun_hepsi_hafif'],
  kafein:    ['kafein_adet_','kafein_gec'],
  spor:      ['spor_seviye=','spor_yapildi','spor_sure_'],
  film:      ['film_var','film_saat_'],
  sosyal:    ['sosyal_sosyal_saat_','sosyal_yalniz_saat_','sosyal_evde_saat_','sosyal_kisi_gorusulen_','sosyal_kisi_iletisim_','sosyal_amac='],
  secim_bes: ['secim_beslenme='],
  besin:     ['besin='],
  su:        ['su_bardak_'],
  duygu:     ['duygu='],
  enerji:    ['enerji='],
};
const PENCERE_ETIKET = {T:'aynı gün','T-1':'ertesi gün','T-3':'son 3 gün içinde','T-7c':'haftalık birikim (7 günde 4+)'};

function ozellikBlogu(ad) {
  for (const [blok, prefler] of Object.entries(BLOK_PREFIXLERI))
    for (const p of prefler)
      if (ad===p||ad.startsWith(p)) return blok;
  return null;
}
function sonucMu(ad) { return SONUC_ONEKLERI.some(p=>ad===p.replace('=','')||ad.startsWith(p)); }
function nedenMu(ad) { return !sonucMu(ad); }

function gunOzelliklericikar(row) {
  const tarih = row.tarih;
  const oz = {};
  const uyku   = row.uyku   || {};
  const ogunler= Array.isArray(row.ogunler) ? row.ogunler : [];
  const icecek = row.icecek || {};
  const spor   = row.spor   || {};
  const saglik = row.saglik || {};
  const ekran  = row.ekran  || {};
  const sosyal = row.sosyal || {};

  // UYKU
  if (uyku.saat != null) oz['uyku_saat'] = parseFloat(uyku.saat);
  if (uyku.yatis)  oz[`uyku_yatis=${uyku.yatis}`]  = true;
  if (uyku.kalkis) oz[`uyku_kalkis=${uyku.kalkis}`] = true;
  if (uyku.aralikli===true) oz['uyku_aralikli'] = true;

  // ÖĞÜNLER
  if (ogunler.length>0) {
    oz['ogun_sayisi'] = ogunler.length;
    const glt  = ogunler.filter(o=>o.gluten).length;
    const sek  = ogunler.filter(o=>o.seker).length;
    const dis  = ogunler.filter(o=>o.yer==='dışarıda').length;
    const agir = ogunler.filter(o=>o.miktar==='ağır').length;
    const haf  = ogunler.filter(o=>o.miktar==='hafif').length;
    if (glt>0)  oz['ogun_gluten_var']  = true;
    if (sek>0)  oz['ogun_seker_var']   = true;
    if (dis>0)  oz['ogun_disarida_var']= true;
    if (agir>0) oz['ogun_agir_var']    = true;
    if (haf===ogunler.length) oz['ogun_hepsi_hafif'] = true;
    const besinler = new Set();
    for (const o of ogunler) for (const b of (o.besinler||[])) besinler.add(b);
    for (const b of besinler) oz[`besin=${b}`] = true;
  }

  // İÇECEK
  const alk = icecek.alkol || {};
  if (alk.var===true) {
    oz['alkol_var'] = true;
    if (alk.miktar!=null) oz['alkol_miktar'] = parseFloat(alk.miktar);
  }
  if (icecek.su!=null) oz['su_bardak'] = parseFloat(icecek.su);
  const kaf = Array.isArray(icecek.kafein_saatleri) ? icecek.kafein_saatleri : [];
  if (kaf.length>0) {
    oz['kafein_adet'] = kaf.length;
    if (kaf.some(s=>s>=16)) oz['kafein_gec'] = true;
  }

  // SPOR
  if (spor.seviye) { oz[`spor_seviye=${spor.seviye}`]=true; oz['spor_yapildi']=true; }
  if (spor.sure!=null) oz['spor_sure'] = parseFloat(spor.sure);

  // SAĞLIK
  const aci = saglik.aci || {};
  if (aci.var===true) {
    oz['aci_var'] = true;
    if (aci.siddet!=null) oz['aci_siddet'] = parseFloat(aci.siddet);
    for (const b of (aci.bolge||[])) oz[`aci_bolge=${b}`] = true;
  }

  // EKRAN
  const film = (ekran.film)||{};
  if (film.var===true) {
    oz['film_var'] = true;
    if (film.saat!=null) oz['film_saat'] = parseFloat(film.saat);
  }

  // SOSYAL
  for (const k of ['sosyal_saat','yalniz_saat','evde_saat','kisi_gorusulen','kisi_iletisim']) {
    if (sosyal[k]!=null) oz[`sosyal_${k}`] = parseFloat(sosyal[k]);
  }
  if (sosyal.amac) oz[`sosyal_amac=${sosyal.amac}`] = true;

  return [tarih, oz];
}

function secimlerEkle(oz, secim) {
  if (!secim) return;
  if (secim.duygu)  oz[`duygu=${secim.duygu}`]  = true;
  if (secim.enerji) oz[`enerji=${secim.enerji}`] = true;
  for (const b of (secim.beslenme||[])) oz[`secim_beslenme=${b}`] = true;
}

function tertilEsikleri(vals) {
  if (!vals.length) return [null,null];
  const s = [...vals].sort((a,b)=>a-b);
  return [s[Math.floor(s.length/3)], s[Math.floor(2*s.length/3)]];
}

function sayisalTertileCevir(gunler) {
  const sayisal = {};
  for (const [,oz] of gunler)
    for (const [k,v] of Object.entries(oz))
      if (typeof v==='number') { if(!sayisal[k])sayisal[k]=[]; sayisal[k].push(v); }

  const esikler = {};
  for (const [k,vals] of Object.entries(sayisal))
    if (vals.length>=9) esikler[k] = tertilEsikleri(vals);

  for (const [,oz] of gunler)
    for (const k of Object.keys(oz))
      if (typeof oz[k]==='number') {
        if (esikler[k]) {
          const v=oz[k], [alt,ust]=esikler[k];
          if (v<=alt)     oz[`${k}_az`]   = true;
          else if (v>=ust) oz[`${k}_cok`]  = true;
          else             oz[`${k}_orta`] = true;
        }
        delete oz[k];
      }
  return [gunler, esikler];
}

function pencerelerHesapla(gunler) {
  const gMap = Object.fromEntries(gunler);
  const sirali = Object.keys(gMap).sort();
  const pencereler = {};

  for (let i=0; i<sirali.length; i++) {
    const t = sirali[i];
    const p = {T: new Set(Object.keys(gMap[t]))};

    if (i>=1) {
      const t1 = sirali[i-1];
      const dt  = new Date(t);
      const dt1 = new Date(t1);
      if ((dt-dt1)/(1000*86400)===1) p['T-1'] = new Set(Object.keys(gMap[t1]));
    }

    const son3 = new Set();
    for (let j=Math.max(0,i-3); j<i; j++)
      for (const k of Object.keys(gMap[sirali[j]])) son3.add(k);
    if (son3.size>0) p['T-3'] = son3;

    const sayim = {};
    for (let j=Math.max(0,i-7); j<i; j++)
      for (const k of Object.keys(gMap[sirali[j]])) sayim[k]=(sayim[k]||0)+1;
    const s7 = new Set(Object.entries(sayim).filter(([,c])=>c>=4).map(([k])=>k));
    if (s7.size>0) p['T-7c'] = s7;

    pencereler[t] = p;
  }
  return pencereler;
}

async function analiz2Tara(minOrnek=5) {
  const [gvAll, secimAll] = await Promise.all([IDB.getAll('gun_verileri'), IDB.getAll('secimler')]);
  const secimMap = Object.fromEntries(secimAll.map(s=>[s.tarih,s]));

  let gunler = [];
  for (const row of gvAll) {
    const [t,oz] = gunOzelliklericikar(row);
    secimlerEkle(oz, secimMap[t]);
    if (Object.keys(oz).length>0) gunler.push([t,oz]);
  }
  // Sadece secim verisi olan günler (gün verisi yoksa)
  for (const s of secimAll) {
    if (gunler.some(([t])=>t===s.tarih)) continue;
    const oz={};
    secimlerEkle(oz, s);
    if (Object.keys(oz).length>0) gunler.push([s.tarih,oz]);
  }
  gunler.sort((a,b)=>a[0].localeCompare(b[0]));

  if (gunler.length < minOrnek*2)
    return {bulgular:[], uyari:'Yetersiz veri', gun_sayisi:gunler.length};

  let esikler;
  [gunler, esikler] = sayisalTertileCevir(gunler);
  const pencereler = pencerelerHesapla(gunler);

  const tumOz = new Set();
  for (const [,oz] of gunler) for (const k of Object.keys(oz)) tumOz.add(k);

  const faktorler = [...tumOz].sort();
  const sonuclar  = faktorler.filter(o=>sonucMu(o));
  const nedenler  = faktorler.filter(o=>nedenMu(o));
  const gMap      = Object.fromEntries(gunler.map(([t,oz])=>[t, new Set(Object.keys(oz))]));
  const pencereAdlari = ['T','T-1','T-3','T-7c'];
  const bulgular = [];

  for (const sonuc of sonuclar) {
    for (const pencere of pencereAdlari) {
      for (const faktor of nedenler) {
        if (faktor===sonuc) continue;
        if (pencere==='T') {
          const fb=ozellikBlogu(faktor), sb=ozellikBlogu(sonuc);
          if (fb&&fb===sb) continue;
        }
        let fvSv=0,fvSy=0,fySv=0,fyYy=0;
        for (const [tarih, sonucSeti] of Object.entries(gMap)) {
          const p=pencereler[tarih]||{};
          const fakSet=p[pencere];
          if (!fakSet) continue;
          const fv=fakSet.has(faktor), sv=sonucSeti.has(sonuc);
          if(fv&&sv)fvSv++;else if(fv&&!sv)fvSy++;else if(!fv&&sv)fySv++;else fyYy++;
        }
        const nFak=fvSv+fvSy, nYok=fySv+fyYy;
        if (nFak<minOrnek||nYok<minOrnek) continue;
        const pFak=fvSv/nFak, pYok=fySv/nYok;
        bulgular.push({
          faktor, sonuc, pencere, pencere_etiket: PENCERE_ETIKET[pencere],
          n_faktor:nFak, n_sonuc_faktorle:fvSv,
          yuzde: Math.round(pFak*100*10)/10,
          karsi_yuzde: Math.round(pYok*100*10)/10,
          fark: Math.round((pFak-pYok)*100*10)/10,
        });
      }
    }
  }

  for (const b of bulgular)
    b.guc_skoru = Math.round(b.fark * Math.log10(b.n_faktor+1)*100)/100;

  bulgular.sort((a,b)=>b.guc_skoru-a.guc_skoru||(b.fark-a.fark)||(b.n_faktor-a.n_faktor));

  // Kök neden tespiti
  const fsIndex = new Map();
  for (let idx=0; idx<bulgular.length; idx++) {
    const b=bulgular[idx], key=`${b.faktor}|${b.sonuc}`;
    if (!fsIndex.has(key)||bulgular[fsIndex.get(key)].guc_skoru<b.guc_skoru) fsIndex.set(key,idx);
  }
  for (const b of bulgular) {
    const kokAdaylar = [];
    for (const aday of bulgular) {
      if (aday.sonuc!==b.faktor) continue;
      const kok2key=`${aday.faktor}|${b.sonuc}`;
      if (!fsIndex.has(kok2key)) continue;
      const kok2=bulgular[fsIndex.get(kok2key)];
      if (kokAdaylar.some(k=>k.faktor===aday.faktor)) continue;
      kokAdaylar.push({
        faktor:aday.faktor,
        kok_to_faktor_yuzde:aday.yuzde, kok_to_faktor_n:aday.n_faktor,
        kok_to_sonuc_yuzde:kok2.yuzde,  kok_to_sonuc_n:kok2.n_faktor,
        ortak_guc: Math.round(Math.min(aday.yuzde,kok2.yuzde)*10)/10,
      });
    }
    kokAdaylar.sort((a,b)=>b.ortak_guc-a.ortak_guc);
    b.olasi_kok_nedenler = kokAdaylar.slice(0,5);
  }

  return {
    bulgular, gun_sayisi:gunler.length,
    faktor_sayisi:faktorler.length, sonuc_sayisi:sonuclar.length,
  };
}

function a2EtiketTurkce(s) {
  const tr = {
    'uyku_saat_az':'az uyku (dağılımına göre)','uyku_saat_orta':'orta uyku','uyku_saat_cok':'çok uyku',
    'uyku_aralikli':'aralıklı uyku','alkol_var':'alkol var (gün verisi)',
    'secim_beslenme=alkol':'alkol (seçim)','kafein_gec':'geç kafein (16:00+)',
    'aci_var':'ağrı/acı var','spor_yapildi':'spor yapıldı','film_var':'film izlendi',
    'ogun_gluten_var':'glutenli öğün','ogun_seker_var':'şekerli öğün',
    'ogun_disarida_var':'dışarıda yemek','ogun_agir_var':'ağır öğün','ogun_hepsi_hafif':'tüm öğünler hafif',
  };
  if (tr[s]) return tr[s];
  if (s.includes('=')) {
    const [k,v]=s.split('=');
    const kt = {duygu:'duygu',enerji:'enerji','aci_bolge':'ağrı bölgesi','uyku_yatis':'yatış',
                'uyku_kalkis':'kalkış','spor_seviye':'spor seviyesi','sosyal_amac':'sosyal amaç',
                besin:'besin','secim_beslenme':'beslenme'}[k]||k;
    return `${kt}: ${v}`;
  }
  return s.replace(/_/g,' ').replace(/sosyal sosyal/,'sosyal');
}

                              : 'bg-stone-100 text-stone-600 dark:bg-zinc-700 dark:text-stone-300';
  const pRenk   = {T:'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300',
                   'T-1':'bg-purple-100 text-purple-700 dark:bg-purple-900/40 dark:text-purple-300',
                   'T-3':'bg-indigo-100 text-indigo-700 dark:bg-indigo-900/40 dark:text-indigo-300',
                   'T-7c':'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300'}[b.pencere]||'bg-stone-100';
  return `
    <div class="a2-kart border border-stone-200 dark:border-zinc-700 rounded-lg p-4 bg-white dark:bg-zinc-800">
      <div class="flex items-center gap-2 flex-wrap mb-2">
        <span class="text-xs px-2 py-0.5 rounded ${pRenk}">${b.pencere_etiket}</span>
        <span class="text-xs px-2 py-0.5 rounded ${farkRenk}">+${b.fark} puan fark</span>
        <span class="text-xs text-stone-400 ml-auto">güç: ${b.guc_skoru}</span>
      </div>
      <div class="text-sm leading-relaxed">
        <span class="font-medium">${a2EtiketTurkce(b.faktor)}</span>
        <span class="text-stone-400 mx-1">→</span>
        <span class="font-medium">${a2EtiketTurkce(b.sonuc)}</span>
      </div>
      <div class="mt-2 text-sm text-stone-600 dark:text-stone-300">
        <strong>${b.n_faktor}</strong> kayıttan <strong>${b.n_sonuc_faktorle}</strong>'inde
        (<strong class="text-amber-600 dark:text-amber-400">%${b.yuzde}</strong>) bu sonuç var.
        Karşı grupta: <strong>%${b.karsi_yuzde}</strong>.
      </div>
      ${a2KokBlok(b)}

}

function a2KokBlok(b) {
  const kokler = (b.olasi_kok_nedenler||[]).filter(k=>k.ortak_guc>=A2_MIN_KOK);
  if (!kokler.length) return '';

}

function zincirBul(bulgular) {
  if (bulgular.length < 3) return [];
  const enIyi = new Map();
  for (const b of bulgular) {
    const k = b.faktor + '|' + b.sonuc;
    if (!enIyi.has(k) || enIyi.get(k).guc_skoru < b.guc_skoru) enIyi.set(k, b);
  }
  const kenarlar = [...enIyi.values()];
  const adj = new Map();
  for (const b of kenarlar) {
    if (!adj.has(b.faktor)) adj.set(b.faktor, []);
    adj.get(b.faktor).push(b);
  }
  let enIyiYol = [], enIyiGuc = -Infinity;
  function dfs(dugum, yol, guc, ziyaret) {
    if (yol.length > enIyiYol.length || (yol.length === enIyiYol.length && guc > enIyiGuc)) {
      enIyiYol = [...yol]; enIyiGuc = guc;
    }
    if (yol.length >= 6) return;
    const devamlar = (adj.get(dugum) || [])
      .filter(b => !ziyaret.has(b.sonuc))
      .sort((a,b2) => b2.guc_skoru - a.guc_skoru)
      .slice(0, 4);
    for (const b of devamlar) {
      ziyaret.add(b.sonuc);
      dfs(b.sonuc, [...yol, b], guc + b.guc_skoru, ziyaret);
      ziyaret.delete(b.sonuc);
    }
  }
  const tumDugumler = new Set(kenarlar.flatMap(b => [b.faktor, b.sonuc]));
  for (const d of tumDugumler) dfs(d, [], 0, new Set([d]));
  if (enIyiYol.length >= 2) {
    const ilk = enIyiYol[0].faktor;
    const son = enIyiYol[enIyiYol.length - 1].sonuc;
    const dongu = kenarlar.find(b => b.faktor === son && b.sonuc === ilk);
    if (dongu) enIyiYol.push({ ...dongu, isDongu: true });
  }
  return enIyiYol;
}

function zincirCiz(zincir) {
  if (!zincir.length) return '';
  const parcalar = [];
  function renk(b) {
    if (b.isDongu) return 'bg-purple-100 border-purple-300 text-purple-800 dark:bg-purple-900/40 dark:border-purple-700 dark:text-purple-200';
    if (b.fark >= 40) return 'bg-red-100 border-red-300 text-red-800 dark:bg-red-900/40 dark:border-red-700 dark:text-red-200';
    if (b.fark >= 20) return 'bg-amber-100 border-amber-300 text-amber-800 dark:bg-amber-900/40 dark:border-amber-700 dark:text-amber-200';
    return 'bg-blue-100 border-blue-300 text-blue-800 dark:bg-blue-900/40 dark:border-blue-700 dark:text-blue-200';
  }
  parcalar.push('<div class="flex flex-col items-center"><div class="border rounded-lg px-3 py-2 text-xs font-medium text-center max-w-[110px] ' + renk(zincir[0]) + '">' + a2EtiketTurkce(zincir[0].faktor) + '</div></div>');
  for (const b of zincir) {
    const ok = b.isDongu ? '↩' : '→';
    const okRenk = b.isDongu ? 'text-purple-500' : 'text-stone-400';
    const gucM = b.isDongu ? '' : '<span class="text-[10px] text-stone-400 block text-center">%' + b.yuzde + '</span>';
    parcalar.push('<div class="flex flex-col items-center pt-2"><span class="' + okRenk + ' text-lg leading-none">' + ok + '</span>' + gucM + '</div>');
    const etiket = b.isDongu ? a2EtiketTurkce(b.sonuc) + ' ↩' : a2EtiketTurkce(b.sonuc);
    parcalar.push('<div class="flex flex-col items-center"><div class="border rounded-lg px-3 py-2 text-xs font-medium text-center max-w-[110px] ' + renk(b) + '">' + etiket + '</div></div>');
  }
  return parcalar.join('');
}

function zincirOzetYaz(zincir) {
  if (!zincir.length) return '';
  const adimlar = [a2EtiketTurkce(zincir[0].faktor)].concat(zincir.map(b => a2EtiketTurkce(b.sonuc)));
  const donguMu = zincir.some(b => b.isDongu);
  const gucOrt = Math.round(zincir.reduce((s,b) => s + b.fark, 0) / zincir.length);
  let m = 'Verinde en güçlü zincir: ' + adimlar.slice(0,-1).join(' → ') + '.';
  if (donguMu) {
    m += ' Bu bir döngü — son halka başa dönüyor. Zincirin bir yerini kırmadan tüm sistem kendini besliyor.';
  } else {
    m += ' Bu tek yönlü bir zincir; başını değiştirmek sonu da etkiler.';
  }
  m += ' Ortalama etki farkı %' + gucOrt + '.';
  const filtrelenmis = zincir.filter(b => !b.isDongu);
  if (filtrelenmis.length) {
    const enZayif = filtrelenmis.sort((a,b2) => a.guc_skoru - b2.guc_skoru)[0];
    m += ' En zayıf halka: "' + a2EtiketTurkce(enZayif.faktor) + '" → "' + a2EtiketTurkce(enZayif.sonuc) + '" (%' + enZayif.yuzde + '). Buradan başlamak en kolay müdahale noktası.';
  }
  return m;
}

function zincirGuncelle(filtrelenmis) {
  const bolum = document.getElementById('zincirBolum');
  const gorsel = document.getElementById('zincirGorsel');
  const ozet   = document.getElementById('zincirOzet');
  const rozet  = document.getElementById('donguRozet');
  const zincir = zincirBul(filtrelenmis);
  if (zincir.length < 2) { bolum.classList.add('hidden'); return; }
  bolum.classList.remove('hidden');
  gorsel.innerHTML = zincirCiz(zincir);
  ozet.textContent = zincirOzetYaz(zincir);
  const donguMu = zincir.some(b => b.isDongu);
  rozet.textContent = donguMu ? '🔄 Döngü tespit edildi' : zincir.length + ' halka';
  rozet.className = 'text-xs px-2 py-0.5 rounded-full ' + (donguMu
    ? 'bg-purple-100 dark:bg-purple-900/50 text-purple-700 dark:text-purple-300'
    : 'bg-emerald-100 dark:bg-emerald-900/50 text-emerald-700 dark:text-emerald-300');
}

async function baslat() {
  await IDB.open();
  // Masaüstünde tüm panelleri göster
  if (window.innerWidth>=768) {
    document.querySelectorAll('#panelTakvim,#panelEditor,#panelGunveri').forEach(p=>p.classList.remove('hidden'));
  } else {
    // Mobilde sadece editor başta görünür
    document.getElementById('panelEditor').classList.add('active');
  }
  sekmeAc(aktifSekme);
  await Promise.all([gunYukle(bugunStr), takvimCiz(), tumGunleriYukle(), etiketleriYukle()]);
}

// Service Worker
if ('serviceWorker' in navigator)
  navigator.serviceWorker.register('./sw.js').catch(e=>console.warn('SW:', e));

baslat();
</script>
