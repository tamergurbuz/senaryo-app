<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>def</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f2efe8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f2efe8;
  --bg2:      #ebe7de;
  --bg3:      #e2ddd2;
  --border:   #ccc8be;
  --border2:  #b0aa9e;
  --text:     #1a1a18;
  --text2:    #4a4840;
  --text3:    #8a8678;
  --gold:     #8a6010;
  --gold2:    #b07820;
  --gold3:    #c09030;
  --red:      #9b2515;
  --green:    #1e5c38;
  --blue:     #1a4a72;
  --font:     'Courier Prime', 'Courier New', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 21px; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); }

/* ── HEADER ── */
#header {
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky; top: 0; z-index: 20;
  padding: 0 20px;
}
.header-inner {
  max-width: 1400px; margin: 0 auto;
  display: flex; align-items: center; gap: 12px;
  height: 48px;
}
.logo {
  font-size: 22px; font-weight: 700; color: var(--gold);
  letter-spacing: -1px; user-select: none;
  border-right: 1px solid var(--border); padding-right: 14px; margin-right: 2px;
}
.logo span { color: var(--text3); font-weight: 400; font-size: 11px; letter-spacing: 1px; vertical-align: middle; margin-left: 4px; }
#aramaInput {
  flex: 1; max-width: 240px;
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--text); font-family: var(--font); font-size: 12px;
  padding: 5px 10px; outline: none;
  transition: border-color .15s;
}
#aramaInput:focus { border-color: var(--gold3); }
#aramaInput::placeholder { color: var(--text3); }
.hdr-btn {
  background: none; border: 1px solid var(--border);
  color: var(--text2); font-family: var(--font); font-size: 11px;
  padding: 4px 10px; cursor: pointer; letter-spacing: .5px;
  transition: all .12s;
}
.hdr-btn:hover { border-color: var(--gold3); color: var(--gold); }
.hdr-spacer { flex: 1; }

/* ── MOBİL NAV ── */
.mob-nav {
  display: none;
  border-top: 1px solid var(--border);
  grid-template-columns: repeat(4, 1fr);
}
.mob-nav-btn {
  background: none; border: none; border-right: 1px solid var(--border);
  color: var(--text2); font-family: var(--font); font-size: 10px;
  padding: 8px 4px; cursor: pointer; letter-spacing: .5px;
  transition: all .12s; text-transform: uppercase;
}
.mob-nav-btn:last-child { border-right: none; }
.mob-nav-btn:hover, .mob-nav-btn.aktif { background: var(--bg2); color: var(--gold); }

/* ── LAYOUT ── */
.layout {
  max-width: 1400px; margin: 0 auto;
  display: grid;
  grid-template-columns: 260px 1fr 300px;
  gap: 0;
  min-height: calc(100vh - 48px);
}
.panel {
  border-right: 1px solid var(--border);
  padding: 20px 20px;
  overflow-y: auto;
}
.panel:last-child { border-right: none; }
.panel-mid { padding: 20px; }

/* ── TİPOGRAFİ ── */
.sec-label {
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text3); margin-bottom: 10px; padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.sec-label.gold { color: var(--gold3); border-color: var(--gold3); }

/* ── TAKVİM ── */
.takvim-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.takvim-nav-btn {
  background: none; border: 1px solid var(--border);
  color: var(--text2); font-family: var(--font); font-size: 12px;
  width: 24px; height: 24px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s;
}
.takvim-nav-btn:hover { border-color: var(--gold3); color: var(--gold); }
.takvim-baslik { font-size: 11px; letter-spacing: 1px; color: var(--text2); }
.takvim-grid {
  display: grid; grid-template-columns: repeat(7,1fr);
  gap: 2px; text-align: center; font-size: 11px; margin-bottom: 10px;
}
.takvim-gun-hdr { color: var(--text3); padding: 3px 0; font-size: 9px; letter-spacing: 1px; }
.takvim-gun {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  cursor: pointer; border: 1px solid transparent;
  transition: all .1s; font-size: 11px; color: var(--text2);
}
.takvim-gun:hover { border-color: var(--border2); color: var(--text); }
.takvim-gun.dolu { color: var(--gold3); }
.takvim-gun.bugun { border-color: var(--border2); }
.takvim-gun.secili { background: var(--gold); color: var(--bg); font-weight: 700; border-color: var(--gold); }
.yil-satir { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.yil-btn {
  font-size: 10px; padding: 2px 6px; border: 1px solid var(--border);
  background: none; color: var(--text3); font-family: var(--font); cursor: pointer;
}
.yil-btn:hover, .yil-btn.aktif { border-color: var(--gold3); color: var(--gold); }

/* ── TÜM GÜNLER ── */
.gun-satir {
  padding: 6px 0; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: all .1s;
}
.gun-satir:hover { padding-left: 4px; border-color: var(--gold3); }
.gun-satir.secili { border-color: var(--gold); }
.gun-tarih { font-size: 11px; color: var(--gold3); letter-spacing: .5px; }
.gun-onizleme { font-size: 12px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

/* ── ETİKETLER ── */
.etiket-chip {
  display: inline-block; font-size: 11px; padding: 2px 7px;
  border: 1px solid var(--border); color: var(--text2);
  margin: 2px; cursor: pointer; transition: all .1s;
}
.etiket-chip:hover { border-color: var(--gold3); color: var(--gold); }

/* ── GÜN BAŞLIĞI ── */
.gun-baslik-row {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
}
.gun-baslik-tarih {
  font-size: 22px; font-weight: 700; color: var(--text);
  font-style: italic; letter-spacing: -0.5px;
}
.analiz2-btn {
  font-family: var(--font); font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; background: none;
  border: 1px solid var(--gold3); color: var(--gold);
  padding: 5px 14px; cursor: pointer; transition: all .15s;
}
.analiz2-btn:hover { background: var(--gold); color: var(--bg); }

/* ── SEÇİMLER ── */
.secim-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.def-select {
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--text); font-family: var(--font); font-size: 12px;
  padding: 6px 8px; outline: none; width: 100%;
  transition: border-color .12s;
}
.def-select:focus { border-color: var(--gold3); }
.def-select option { background: var(--bg2); }

/* ── BESİN CHİPLERİ ── */
.besin-grid { display: flex; flex-wrap: wrap; gap: 4px; }
.besin-chip {
  font-size: 10px; padding: 3px 8px; border: 1px solid var(--border);
  background: none; color: var(--text2); font-family: var(--font);
  cursor: pointer; letter-spacing: .3px; transition: all .1s;
}
.besin-chip:hover { border-color: var(--gold3); }
.besin-chip.aktif { background: var(--gold); color: var(--bg); border-color: var(--gold); }

/* ── SEKMELER ── */
.sekmeler {
  display: flex; border-bottom: 1px solid var(--border);
  margin-bottom: 16px; gap: 0;
}
.sekme-btn {
  font-family: var(--font); font-size: 11px; letter-spacing: 1.5px;
  text-transform: uppercase; background: none; border: none;
  color: var(--text3); padding: 10px 14px; cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: all .12s; display: flex; align-items: center; gap: 5px;
}
.sekme-btn:hover { color: var(--text2); }
.sekme-btn.aktif { color: var(--gold); border-bottom-color: var(--gold); }
.sekme-sayac { font-size: 9px; color: var(--text3); }
.taslak-nokta { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); display: inline-block; }

/* ── NOTLAR ── */
.not-kart {
  border-left: 2px solid var(--border2);
  padding: 8px 0 8px 12px; margin-bottom: 10px;
  position: relative;
}
.not-kart.gunluk { border-left-color: var(--gold3); }
.not-kart.ruya   { border-left-color: var(--blue); }
.not-kart.ilginc { border-left-color: var(--green); }
.not-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; flex-wrap: wrap; }
.not-kat {
  font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 1px 6px; border: 1px solid;
}
.not-kat.gunluk { color: var(--gold3); border-color: var(--gold3); }
.not-kat.ruya   { color: #5b8abf; border-color: #2a5f8f; }
.not-kat.ilginc { color: #4aaa72; border-color: #2e7d52; }
.not-zaman { font-size: 9px; color: var(--text3); letter-spacing: .5px; }
.not-icerik { font-size: 14px; color: var(--text); line-height: 1.7; white-space: pre-wrap; }
.not-etiketler { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
.not-etiket {
  font-size: 9px; color: var(--text3); border: 1px solid var(--border);
  padding: 1px 5px; cursor: pointer;
}
.not-etiket:hover { color: var(--gold); border-color: var(--gold3); }
.not-sil {
  position: absolute; top: 6px; right: 0;
  font-size: 10px; color: var(--text3); background: none; border: none;
  cursor: pointer; opacity: 0; transition: opacity .1s; font-family: var(--font);
}
.not-kart:hover .not-sil { opacity: 1; }
.not-sil:hover { color: var(--red); }

/* ── EDITÖR ── */
.editor-bolum { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 16px; }
.editor-ust {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px; flex-wrap: wrap; gap: 8px;
}
.editor-kat-etiket { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); }
.taslak-ind {
  font-size: 9px; color: var(--text3); letter-spacing: .3px;
  opacity: 0; transition: opacity .3s;
}
.taslak-ind.gorunur { opacity: 1; }
.def-select-sm {
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--text2); font-family: var(--font); font-size: 11px;
  padding: 4px 6px; outline: none;
}
.def-input {
  width: 100%; background: var(--bg2); border: 1px solid var(--border);
  color: var(--text); font-family: var(--font); font-size: 13px;
  padding: 7px 10px; outline: none; margin-bottom: 6px;
  transition: border-color .12s;
}
.def-input:focus { border-color: var(--gold3); }
.def-input::placeholder { color: var(--text3); }
.def-textarea {
  width: 100%; background: var(--bg2); border: 1px solid var(--border);
  color: var(--text); font-family: var(--font); font-size: 14px;
  padding: 10px; outline: none; resize: vertical; min-height: 120px;
  line-height: 1.7; transition: border-color .12s; margin-bottom: 8px;
}
.def-textarea:focus { border-color: var(--gold3); }
.def-textarea::placeholder { color: var(--text3); }
.editor-alt { display: flex; justify-content: flex-end; gap: 8px; align-items: center; }
.btn-kaydet {
  font-family: var(--font); font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; background: var(--gold);
  color: var(--bg); border: none; padding: 7px 18px; cursor: pointer;
  font-weight: 700; transition: all .12s;
}
.btn-kaydet:hover { background: var(--gold2); }
.btn-taslak-sil {
  font-family: var(--font); font-size: 10px; letter-spacing: .5px;
  background: none; border: 1px solid var(--border); color: var(--text3);
  padding: 6px 12px; cursor: pointer; transition: all .12s;
}
.btn-taslak-sil:hover { border-color: var(--red); color: var(--red); }

/* ── SONUÇ PANELİ ── */
.sonuc-panel {
  border: 1px solid var(--border2); padding: 14px;
  margin-top: 16px; background: var(--bg2);
}
.sonuc-ust { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.sonuc-baslik { font-size: 11px; color: var(--gold); letter-spacing: .5px; }
.sonuc-kapat {
  background: none; border: none; color: var(--text3);
  font-size: 16px; cursor: pointer; font-family: var(--font);
}
.sonuc-kapat:hover { color: var(--text); }
.sonuc-kart {
  padding: 8px 0; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: all .1s;
}
.sonuc-kart:last-child { border-bottom: none; }
.sonuc-kart:hover { padding-left: 4px; }
.sonuc-tarih { font-size: 9px; color: var(--text3); letter-spacing: .5px; margin-bottom: 3px; }
.sonuc-metin { font-size: 12px; color: var(--text); line-height: 1.6; }
mark { background: var(--gold3); color: var(--bg); padding: 0 1px; }

/* ── GÜN VERİSİ ACC ── */
.gv-acc-item { border-bottom: 1px solid var(--border); }
.gv-acc-baslik {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 0; cursor: pointer; user-select: none;
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text2); transition: color .1s;
}
.gv-acc-baslik:hover { color: var(--gold); }
.gv-acc-ok { font-size: 9px; color: var(--text3); transition: transform .2s; }
.gv-acc-item.acik .gv-acc-ok { transform: rotate(90deg); }
.gv-acc-icerik { display: none; padding-bottom: 12px; }
.gv-acc-item.acik .gv-acc-icerik { display: block; }
.gv-dolu-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold3); display: inline-block; margin-left: 5px; }
.gv-label { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); margin-bottom: 5px; display: block; margin-top: 8px; }
.gv-row { display: flex; flex-wrap: wrap; gap: 3px; }
.gv-opt {
  font-size: 10px; padding: 3px 8px; border: 1px solid var(--border);
  background: none; color: var(--text2); font-family: var(--font);
  cursor: pointer; transition: all .1s; letter-spacing: .3px;
}
.gv-opt:hover { border-color: var(--gold3); }
.gv-opt.aktif { background: var(--gold); color: var(--bg); border-color: var(--gold); }
.gv-input {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-family: var(--font); font-size: 12px;
  padding: 5px 8px; outline: none; width: 100%;
  transition: border-color .12s;
}
.gv-input:focus { border-color: var(--gold3); }
.gv-input-sm { width: 70px; }
.gv-kaydedildi { font-size: 9px; color: var(--text3); letter-spacing: .5px; opacity: 0; transition: opacity .3s; }
.gv-kaydedildi.gorunur { opacity: 1; }
.ogun-karti {
  border: 1px solid var(--border); padding: 10px;
  margin-bottom: 6px; position: relative; background: var(--bg);
}
.ogun-sil {
  position: absolute; top: 6px; right: 8px;
  font-size: 10px; color: var(--text3); background: none; border: none;
  cursor: pointer; font-family: var(--font);
}
.ogun-sil:hover { color: var(--red); }

/* ── ANALİZ 2 MODALİ ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,.8);
  display: flex; align-items: flex-start; justify-content: center;
  padding: 16px; overflow-y: auto;
}
.modal-overlay.hidden { display: none; }
.modal-kasa {
  background: var(--bg2); border: 1px solid var(--border2);
  width: 100%; max-width: 860px;
}
.modal-header {
  position: sticky; top: 0; background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px; display: flex; align-items: flex-start; justify-content: space-between;
  z-index: 10;
}
.modal-baslik { font-size: 13px; letter-spacing: 1px; color: var(--text); }
.modal-ozet { font-size: 10px; color: var(--text3); margin-top: 3px; letter-spacing: .3px; }
.modal-kapat {
  background: none; border: 1px solid var(--border); color: var(--text3);
  font-family: var(--font); font-size: 14px; width: 28px; height: 28px;
  cursor: pointer; transition: all .12s; display: flex; align-items: center; justify-content: center;
}
.modal-kapat:hover { border-color: var(--red); color: var(--red); }

/* ── ZİNCİR BÖLÜMÜ ── */
.zincir-bolum {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.zincir-ust { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.zincir-baslik { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold3); }
.zincir-rozet {
  font-size: 9px; letter-spacing: 1px; padding: 2px 8px;
  border: 1px solid var(--gold3); color: var(--gold);
}
.zincir-gorsel { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; margin-bottom: 10px; }
.zincir-kutu {
  font-size: 10px; padding: 5px 10px; border: 1px solid var(--border2);
  color: var(--text); max-width: 130px; text-align: center;
  letter-spacing: .3px; line-height: 1.4;
}
.zincir-kutu.guclu { border-color: var(--red); color: #e05050; }
.zincir-kutu.orta  { border-color: var(--gold3); color: var(--gold); }
.zincir-kutu.hafif { border-color: var(--blue); color: #5b8abf; }
.zincir-kutu.dongu { border-color: var(--green); color: #4aaa72; }
.zincir-ok { font-size: 12px; color: var(--text3); }
.zincir-yuzde { font-size: 9px; color: var(--text3); display: block; text-align: center; }
.zincir-ozet { font-size: 11px; color: var(--text2); line-height: 1.7; border-left: 2px solid var(--gold3); padding-left: 10px; }

/* ── FİLTRELER ── */
.filtreler {
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  background: var(--bg); display: flex; flex-direction: column; gap: 10px;
}
.filtre-satir { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.filtre-label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); min-width: 90px; }
.range-wrap { flex: 1; min-width: 140px; }
.def-range { width: 100%; accent-color: var(--gold); }
.range-deger { font-size: 10px; color: var(--gold); letter-spacing: .5px; min-width: 36px; text-align: right; }
.filtre-btn {
  font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
  padding: 3px 9px; border: 1px solid var(--border);
  background: none; color: var(--text3); font-family: var(--font);
  cursor: pointer; transition: all .1s;
}
.filtre-btn:hover { border-color: var(--gold3); color: var(--gold3); }
.filtre-btn.aktif { background: var(--gold); color: var(--bg); border-color: var(--gold); }
.filtre-sayac { font-size: 9px; color: var(--text3); letter-spacing: .5px; margin-left: auto; }

/* ── ANALİZ BULGULAR ── */
.bulgular-liste { padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; max-height: 55vh; overflow-y: auto; }
.bulgu-kart {
  border: 1px solid var(--border); padding: 12px;
  transition: border-color .1s;
}
.bulgu-kart:hover { border-color: var(--border2); }
.bulgu-ust { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
.bulgu-pencere {
  font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
  padding: 2px 7px; border: 1px solid;
}
.bulgu-pencere.T       { color: #5b8abf; border-color: #2a5f8f; }
.bulgu-pencere.T-1     { color: #9b6bb5; border-color: #6b3b85; }
.bulgu-pencere.T-3     { color: #5b9b7f; border-color: #2e7d52; }
.bulgu-pencere.T-7c    { color: var(--gold3); border-color: var(--gold3); }
.bulgu-fark {
  font-size: 9px; letter-spacing: 1px; padding: 2px 7px; border: 1px solid;
}
.bulgu-fark.guclu { color: #e05050; border-color: var(--red); }
.bulgu-fark.orta  { color: var(--gold); border-color: var(--gold3); }
.bulgu-fark.hafif { color: var(--text3); border-color: var(--border); }

<script>
// =====================================================================
// SABİTLER

const DUYGULAR   = ['','huzurlu','mutlu','nötr','kaygılı','üzgün','öfkeli','bitkin'];
const ENERJILER  = ['','yüksek','orta','düşük'];
const BESLENMELER= [
  {ad:'ev yemeği',e:'ev'},{ad:'dışarıda yemek',e:'dış'},{ad:'fast food',e:'ff'},
  {ad:'atıştırmalık',e:'atş'},{ad:'hafif',e:'hf'},{ad:'kafein',e:'kf'},
  {ad:'alkol',e:'alk'},{ad:'şekerli içecek',e:'şkr'},
];
const ZAMAN_TR   = {sabah:'sabah',oglen:'öğlen',aksam:'akşam'};
const KAT_AD     = {gunluk:'günlük',ruya:'rüya',ilginc:'ilginç'};
const KAT_PH     = {gunluk:'bugün ne yaşadın_',ruya:'rüyanda ne gördün_',ilginc:'bugünün ilginç anı_'};
const UYKU_YATIS = ['erken','normal','geç'];
const OGUN_TIPLER= ['kahvaltı','öğle','akşam','ara öğün'];
const OGUN_YERI  = ['evde','dışarıda'];
const OGUN_MIKTAR= ['hafif','normal','ağır'];
const ANA_BESIN  = ['kırmızı et','beyaz et','balık','sebze','meyve','tahıl','süt ürünü','vegan'];
const SPOR_SEV   = ['hafif','normal','ağır'];
const AGRI_BOLGE = ['baş','boyun','sırt','bel','karın','göğüs','kollar','bacaklar','eklemler','diğer'];
const AYLAR      = ['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];

// =====================================================================
// IndexedDB
// =====================================================================
const IDB = (() => {
  const DB='defter', VER=1; let _db=null;
  function open() {
    if (_db) return Promise.resolve(_db);
    return new Promise((res,rej) => {
      const req = indexedDB.open(DB, VER);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('notlar')) {
          const ns = db.createObjectStore('notlar',{keyPath:'id',autoIncrement:true});
          ns.createIndex('tarih','tarih',{unique:false});
          ns.createIndex('kategori','kategori',{unique:false});
        }
        if (!db.objectStoreNames.contains('secimler'))  db.createObjectStore('secimler',{keyPath:'tarih'});
        if (!db.objectStoreNames.contains('gun_verileri')) db.createObjectStore('gun_verileri',{keyPath:'tarih'});
        if (!db.objectStoreNames.contains('taslaklar')) db.createObjectStore('taslaklar',{keyPath:['tarih','kategori']});
      };
      req.onsuccess = e => { _db=e.target.result; res(_db); };
      req.onerror   = e => rej(e.target.error);
    });
  }
  function wrap(req) { return new Promise((res,rej) => { req.onsuccess=e=>res(e.target.result); req.onerror=e=>rej(e.target.error); }); }
  async function tx(store,mode='readonly') { const db=await open(); return db.transaction(store,mode); }
  async function get(store,key) { return wrap((await tx(store)).objectStore(store).get(key)); }
  async function getAll(store) { return wrap((await tx(store)).objectStore(store).getAll()); }
  async function getAllByIndex(store,idx,val) { return wrap((await tx(store)).objectStore(store).index(idx).getAll(val)); }
  async function put(store,obj) { return wrap((await tx(store,'readwrite')).objectStore(store).put(obj)); }
  async function del(store,key) { return wrap((await tx(store,'readwrite')).objectStore(store).delete(key)); }
  return {get,getAll,getAllByIndex,put,del,open};
})();

// =====================================================================
// VERİ API
// =====================================================================
async function gunGetir(tarih) {
  const [notlar,secim,gv,tum_t] = await Promise.all([
    IDB.getAllByIndex('notlar','tarih',tarih),
    IDB.get('secimler',tarih),
    IDB.get('gun_verileri',tarih),
    IDB.getAll('taslaklar'),
  ]);
  const taslaklar = {gunluk:{icerik:'',etiketler:'',zaman:''},ruya:{icerik:'',etiketler:'',zaman:''},ilginc:{icerik:'',etiketler:'',zaman:''}};
  for (const t of tum_t) if (t.tarih===tarih) taslaklar[t.kategori]={icerik:t.icerik||'',etiketler:(t.etiketler||[]).join(', '),zaman:t.zaman||''};
  return { notlar:notlar||[], secim:secim||{duygu:'',enerji:'',beslenme:[]}, gun_verileri:gv||{uyku:{},ogunler:[],icecek:{},spor:{},saglik:{},ekran:{},sosyal:{}}, taslaklar };
}
async function notluGunler() {
  const tum=await IDB.getAll('notlar'); const map={};
  for (const n of tum) { if(!map[n.tarih])map[n.tarih]={tarih:n.tarih,adet:0,onizleme:''}; map[n.tarih].adet++; if(!map[n.tarih].onizleme&&n.icerik)map[n.tarih].onizleme=n.icerik.slice(0,50); }
  return Object.values(map).sort((a,b)=>b.tarih.localeCompare(a.tarih));
}
async function etiketlerDB() {
  const tum=await IDB.getAll('notlar'); const s={};
  for (const n of tum) for (const e of (n.etiketler||[])) s[e]=(s[e]||0)+1;
  return Object.entries(s).sort((a,b)=>b[1]-a[1]).map(([ad,adet])=>({ad,adet}));
}
async function etiketNotlar(ad) {
  const tum=await IDB.getAll('notlar');
  return tum.filter(n=>(n.etiketler||[]).includes(ad)).sort((a,b)=>b.tarih.localeCompare(a.tarih));
}
async function araDB(q) {
  if(!q)return []; const tum=await IDB.getAll('notlar'); const ql=q.toLowerCase();
  return tum.filter(n=>n.icerik.toLowerCase().includes(ql)).sort((a,b)=>b.tarih.localeCompare(a.tarih)).map(n=>({...n,parca:vurgula(n.icerik,q)}));
}
async function disaAktar() {
  const [notlar,secimler,gvAll,taslaklar]=await Promise.all([IDB.getAll('notlar'),IDB.getAll('secimler'),IDB.getAll('gun_verileri'),IDB.getAll('taslaklar')]);
  const json=JSON.stringify({notlar,secimler,gun_verileri:gvAll,taslaklar,versiyon:3,tarih:new Date().toISOString()},null,2);
  const a=document.createElement('a'); a.href='data:application/json;charset=utf-8,'+encodeURIComponent(json);
  a.download=`def-yedek-${new Date().toISOString().slice(0,10)}.json`; a.click();
}
async function iceAktar(e) {
  const file=e.target.files[0]; if(!file)return;
  const text=await file.text(); let data; try{data=JSON.parse(text);}catch{alert('Geçersiz JSON.');return;}
  if(!confirm(`${(data.notlar||[]).length} not, ${(data.secimler||[]).length} seçim içe aktarılacak. Devam?`))return;
  const writes=[];
  for(const n of(data.notlar||[]))writes.push(IDB.put('notlar',n));
  for(const s of(data.secimler||[]))writes.push(IDB.put('secimler',s));
  for(const g of(data.gun_verileri||[]))writes.push(IDB.put('gun_verileri',g));
  for(const t of(data.taslaklar||[]))writes.push(IDB.put('taslaklar',t));
  await Promise.all(writes);
  alert('İçe aktarma tamamlandı.');
  gunYukle(seciliTarih); takvimCiz(); tumGunleriYukle(); etiketleriYukle();
  e.target.value='';
}

// =====================================================================
// DURUM
// =====================================================================
let bugunStr=new Date().toISOString().slice(0,10);
let seciliTarih=bugunStr;
let takvimAy=new Date().getMonth(), takvimYil=new Date().getFullYear();
let seciliBesinler=new Set();
let aktifSekme=localStorage.getItem('aktifSekme')||'gunluk';
let sonGunData=null, taslaklarLokal={gunluk:{},ruya:{},ilginc:{}};
let taslakTimer=null, gv={uyku:{},ogunler:[],icecek:{},spor:{},saglik:{},ekran:{},sosyal:{}};
let gvTimer=null, accAcik=JSON.parse(localStorage.getItem('accAcik')||'{}');
let A2_BULGULAR=[], A2_PENCERE='hepsi', A2_SONUC='hepsi', A2_MIN_KOK=40;

// =====================================================================
// YARDIMCILAR
// =====================================================================
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function tarihGoster(t){return new Date(t+'T12:00:00').toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function vurgula(metin,q){const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');return esc(metin.slice(0,300)).replace(re,'<mark>$1</mark>');}

function besinTogle(ad){if(seciliBesinler.has(ad))seciliBesinler.delete(ad);else seciliBesinler.add(ad);besinChipleriGuncelle();secimKaydetUI();}
function besinChipleriGuncelle(){document.querySelectorAll('.besin-chip').forEach(el=>el.classList.toggle('aktif',seciliBesinler.has(el.dataset.ad)));}
function secimKaydetUI(){IDB.put('secimler',{tarih:seciliTarih,duygu:document.getElementById('duygu').value,enerji:document.getElementById('enerji').value,beslenme:[...seciliBesinler]});}

// =====================================================================
// SEKME & TASLAK
// =====================================================================
function taslakNoktalariniGuncelle(){
  ['gunluk','ruya','ilginc'].forEach(k=>{
    const t=taslaklarLokal[k];
    const dolu=(t.icerik&&t.icerik.trim())||(t.etiketler&&t.etiketler.trim());
    document.getElementById(`taslakNokta-${k}`).style.display=dolu?'inline-block':'none';
  });
  const t=taslaklarLokal[aktifSekme];
  const dolu=(t.icerik&&t.icerik.trim())||(t.etiketler&&t.etiketler.trim());
  document.getElementById('taslakSilBtn').style.display=dolu?'inline-block':'none';
}
function sekmeAc(kat){
  if(sonGunData)taslaklarLokal[aktifSekme]={icerik:document.getElementById('yeniIcerik').value,etiketler:document.getElementById('yeniEtiketler').value,zaman:document.getElementById('zamanSec').value};
  aktifSekme=kat; localStorage.setItem('aktifSekme',kat);
  document.querySelectorAll('.sekme-btn').forEach(b=>b.classList.remove('aktif'));
  document.getElementById(`sekmeBtn-${kat}`).classList.add('aktif');
  document.getElementById('yeniKatEtiket').textContent=KAT_AD[kat]+'_';
  document.getElementById('yeniIcerik').placeholder=KAT_PH[kat];
  const t=taslaklarLokal[kat]||{};
  document.getElementById('yeniIcerik').value=t.icerik||'';
  document.getElementById('yeniEtiketler').value=t.etiketler||'';
  document.getElementById('zamanSec').value=t.zaman||'';
  if(sonGunData)notlariCiz(sonGunData);
  taslakNoktalariniGuncelle();
}
function taslakKaydetGec(){
  clearTimeout(taslakTimer);
  taslakTimer=setTimeout(async()=>{
    const ic=document.getElementById('yeniIcerik').value;
    const et=document.getElementById('yeniEtiketler').value;
    const zm=document.getElementById('zamanSec').value;
    taslaklarLokal[aktifSekme]={icerik:ic,etiketler:et,zaman:zm};
    await IDB.put('taslaklar',{tarih:seciliTarih,kategori:aktifSekme,icerik:ic,etiketler:et.split(',').map(s=>s.trim()).filter(Boolean),zaman:zm});
    const ind=document.getElementById('taslakInd'); ind.classList.add('gorunur');
    setTimeout(()=>ind.classList.remove('gorunur'),1500);
    taslakNoktalariniGuncelle();
  },1500);
}

async function taslakSil(){
  if(!confirm('Taslak silinsin mi?'))return;
  document.getElementById('yeniIcerik').value=''; document.getElementById('yeniEtiketler').value=''; document.getElementById('zamanSec').value='';
  taslaklarLokal[aktifSekme]={icerik:'',etiketler:'',zaman:''};
  await IDB.put('taslaklar',{tarih:seciliTarih,kategori:aktifSekme,icerik:'',etiketler:[],zaman:''});
  taslakNoktalariniGuncelle();
}

// =====================================================================
// NOT: kaydet/sil/görüntüle
// =====================================================================
function notlariCiz(data){
  const liste=document.getElementById('notlarListe');
  const filtre=data.notlar.filter(n=>n.kategori===aktifSekme);
  ['gunluk','ruya','ilginc'].forEach(k=>document.getElementById(`sayac-${k}`).textContent=data.notlar.filter(n=>n.kategori===k).length);
  if(!filtre.length){liste.innerHTML=`<div style="font-size:11px;color:var(--text3);padding:12px 0;font-style:italic">bu gün için ${KAT_AD[aktifSekme]} kaydı yok_</div>`;return;}
  liste.innerHTML=filtre.map(n=>`
    <div class="not-kart ${n.kategori}">
      <button class="not-sil" onclick="notSil(${n.id})">[ sil ]</button>
      <div class="not-meta">
        <span class="not-kat ${n.kategori}">${KAT_AD[n.kategori]}</span>
        ${n.zaman?`<span class="not-zaman">${ZAMAN_TR[n.zaman]||n.zaman}</span>`:''}
      </div>
      <div class="not-icerik">${esc(n.icerik)}</div>
      ${n.etiketler&&n.etiketler.length?`<div class="not-etiketler">${n.etiketler.map(e=>`<span class="not-etiket" onclick="etiketAc('${esc(e)}')">#${esc(e)}</span>`).join('')}</div>`:''}
    </div>`).join('');
}
async function gunYukle(tarih){
  seciliTarih=tarih;
  const r=await gunGetir(tarih); sonGunData=r;
  document.getElementById('gunBaslik').textContent=tarihGoster(tarih);
  document.getElementById('duygu').value=r.secim.duygu||'';
  document.getElementById('enerji').value=r.secim.enerji||'';
  seciliBesinler=new Set(r.secim.beslenme||[]); besinChipleriGuncelle();
  taslaklarLokal=r.taslaklar;
  const t=taslaklarLokal[aktifSekme]||{};
  document.getElementById('yeniIcerik').value=t.icerik||'';
  document.getElementById('yeniEtiketler').value=t.etiketler||'';
  document.getElementById('zamanSec').value=t.zaman||'';
  notlariCiz(r); taslakNoktalariniGuncelle();
  gv=r.gun_verileri; if(!gv)gv={uyku:{},ogunler:[],icecek:{},spor:{},saglik:{},ekran:{},sosyal:{}};
  if(!gv.ogunler)gv.ogunler=[]; gvCiz(); takvimCiz();
}
async function notKaydet(){
  const ic=document.getElementById('yeniIcerik').value.trim(); if(!ic)return;
  const et=document.getElementById('yeniEtiketler').value.split(',').map(s=>s.trim()).filter(Boolean);
  await IDB.put('notlar',{tarih:seciliTarih,kategori:aktifSekme,icerik:ic,etiketler:et,zaman:document.getElementById('zamanSec').value||null,olusturulma:new Date().toISOString()});
  document.getElementById('yeniIcerik').value=''; document.getElementById('yeniEtiketler').value=''; document.getElementById('zamanSec').value='';
  taslaklarLokal[aktifSekme]={icerik:'',etiketler:'',zaman:''};
  await IDB.put('taslaklar',{tarih:seciliTarih,kategori:aktifSekme,icerik:'',etiketler:[],zaman:''});
  taslakNoktalariniGuncelle(); gunYukle(seciliTarih); tumGunleriYukle(); etiketleriYukle();
}
async function notSil(id){
  if(!confirm('Bu not silinsin mi?'))return;
  await IDB.del('notlar',id); gunYukle(seciliTarih); tumGunleriYukle(); etiketleriYukle();
}

// TAKVİM
// =====================================================================
async function takvimCiz(){
  const ilkGun=new Date(takvimYil,takvimAy,1).getDay()||7;
  const gunSay=new Date(takvimYil,takvimAy+1,0).getDate();
  document.getElementById('takvimBaslik').textContent=`${AYLAR[takvimAy]} ${takvimYil}`;
  const notGunler=await notluGunler(); const dolu=new Set(notGunler.map(g=>g.tarih));
  let html=['Pt','Sa','Ça','Pe','Cu','Ct','Pz'].map(g=>`<div class="takvim-gun-hdr">${g}</div>`).join('');
  for(let i=1;i<ilkGun;i++)html+=`<div></div>`;
  for(let g=1;g<=gunSay;g++){
    const ts=`${takvimYil}-${String(takvimAy+1).padStart(2,'0')}-${String(g).padStart(2,'0')}`;
    const cls=['takvim-gun',ts===seciliTarih?'secili':dolu.has(ts)?'dolu':ts===bugunStr?'bugun':''].filter(Boolean).join(' ');
    html+=`<div class="${cls}" onclick="gunYukle('${ts}')">${g}</div>`;
  }
  document.getElementById('takvimGrid').innerHTML=html;
  const yillar=[...new Set(notGunler.map(g=>g.tarih.slice(0,4)))].sort();
  const su=new Date().getFullYear().toString();
  if(!yillar.includes(su))yillar.push(su);
  document.getElementById('yilSatir').innerHTML=yillar.map(y=>`<button class="yil-btn ${y==takvimYil?'aktif':''}" onclick="yilGit(${y})">${y}</button>`).join('');
}
function takvimGez(d){takvimAy+=d;if(takvimAy<0){takvimAy=11;takvimYil--;}if(takvimAy>11){takvimAy=0;takvimYil++;}takvimCiz();}
function yilGit(y){takvimYil=y;takvimCiz();}
async function tumGunleriYukle(){
  const gunler=await notluGunler(); const el=document.getElementById('tumGunlerListe');
  if(!gunler.length){el.innerHTML=`<div style="font-size:10px;color:var(--text3);font-style:italic">henüz kayıt yok_</div>`;return;}
  el.innerHTML=gunler.map(g=>`<div class="gun-satir ${g.tarih===seciliTarih?'secili':''}" onclick="gunYukle('${g.tarih}')"><div class="gun-tarih">${g.tarih} <span style="color:var(--text3)">(${g.adet})</span></div><div class="gun-onizleme">${esc(g.onizleme||'')}</div></div>`).join('');
}
async function etiketleriYukle(){
  const ets=await etiketlerDB(); const el=document.getElementById('etiketlerPaneli');
  if(!ets.length){el.innerHTML=`<div style="font-size:10px;color:var(--text3);font-style:italic">henüz etiket yok_</div>`;return;}
  el.innerHTML=ets.map(e=>`<span class="etiket-chip" onclick="etiketAc('${esc(e.ad)}')">#${esc(e.ad)}<span style="color:var(--text3)"> ${e.adet}</span></span>`).join('');
}
async function etiketAc(ad){
  const rows=await etiketNotlar(ad); const p=document.getElementById('sonucPanel'); p.style.display='block';
  p.innerHTML=`<div class="sonuc-ust"><div class="sonuc-baslik">#${esc(ad)} — ${rows.length} kayıt</div><button class="sonuc-kapat" onclick="document.getElementById('sonucPanel').style.display='none'">×</button></div><div>${rows.map(r=>`<div class="sonuc-kart" onclick="gunYukle('${r.tarih}')"><div class="sonuc-tarih"><span class="not-kat ${r.kategori}" style="margin-right:6px">${KAT_AD[r.kategori]}</span>${r.tarih}${r.zaman?' · '+ZAMAN_TR[r.zaman]:''}</div><div class="sonuc-metin">${esc(r.icerik.slice(0,180))}${r.icerik.length>180?'…':''}</div></div>`).join('')}</div>`;
}
let aramaTimer;
document.getElementById('aramaInput').oninput=e=>{
  clearTimeout(aramaTimer); const q=e.target.value.trim();
  if(!q){document.getElementById('sonucPanel').style.display='none';return;}
  aramaTimer=setTimeout(async()=>{
    const rows=await araDB(q); const p=document.getElementById('sonucPanel'); p.style.display='block';
    p.innerHTML=`<div class="sonuc-ust"><div class="sonuc-baslik">"${esc(q)}" — ${rows.length} sonuç</div><button class="sonuc-kapat" onclick="document.getElementById('sonucPanel').style.display='none';document.getElementById('aramaInput').value=''">×</button></div><div>${rows.length?rows.map(r=>`<div class="sonuc-kart" onclick="gunYukle('${r.tarih}')"><div class="sonuc-tarih"><span class="not-kat ${r.kategori}" style="margin-right:6px">${KAT_AD[r.kategori]}</span>${r.tarih}</div><div class="sonuc-metin">${r.parca}</div></div>`).join(''):'<div style="font-size:11px;color:var(--text3);padding:8px 0;font-style:italic">sonuç yok_</div>'}</div>`;
  },250);
};

// =====================================================================
// GÜN VERİLERİ
// =====================================================================
function gvDoluMu(b){const v=gv[b];if(!v)return false;if(Array.isArray(v))return v.length>0;if(typeof v==='object')return Object.keys(v).some(k=>{const x=v[k];if(x===null||x===undefined||x===''||x===false)return false;if(Array.isArray(x))return x.length>0;if(typeof x==='object')return Object.keys(x).length>0;return true;});return false;}
function gvCiz(){
  const bs=[{k:'uyku',ad:'uyku',fn:gvCizUyku},{k:'ogunler',ad:'yemek',fn:gvCizYemek},{k:'icecek',ad:'içecek & su',fn:gvCizIcecek},{k:'spor',ad:'spor',fn:gvCizSpor},{k:'saglik',ad:'sağlık',fn:gvCizSaglik},{k:'ekran',ad:'ekran',fn:gvCizEkran},{k:'sosyal',ad:'sosyal',fn:gvCizSosyal}];
  document.getElementById('gvAcc').innerHTML=bs.map(b=>`<div class="gv-acc-item ${accAcik[b.k]?'acik':''}" id="acc-${b.k}"><div class="gv-acc-baslik" onclick="accTogle('${b.k}')"><span>${b.ad}${gvDoluMu(b.k)?'<span class="gv-dolu-dot"></span>':''}</span><span class="gv-acc-ok">▶</span></div><div class="gv-acc-icerik" id="acc-ic-${b.k}"></div></div>`).join('');
  bs.forEach(b=>{const el=document.getElementById(`acc-ic-${b.k}`);if(el)el.innerHTML=b.fn();});
}
function accTogle(k){accAcik[k]=!accAcik[k];localStorage.setItem('accAcik',JSON.stringify(accAcik));document.getElementById(`acc-${k}`)?.classList.toggle('acik');}
function gvKayitGec(){
  clearTimeout(gvTimer);
  gvTimer=setTimeout(async()=>{
    await IDB.put('gun_verileri',{tarih:seciliTarih,...gv});
    const ind=document.getElementById('gvKaydedildi'); ind.classList.add('gorunur');
    setTimeout(()=>ind.classList.remove('gorunur'),1200); gvCiz();
  },700);
}
function gvCizUyku(){const u=gv.uyku||{};return`<span class="gv-label">yatış</span><div class="gv-row">${UYKU_YATIS.map(s=>`<button class="gv-opt ${u.yatis===s?'aktif':''}" onclick="gvUs('yatis','${s}')">${s}</button>`).join('')}</div><span class="gv-label">kalkış</span><div class="gv-row">${UYKU_YATIS.map(s=>`<button class="gv-opt ${u.kalkis===s?'aktif':''}" onclick="gvUs('kalkis','${s}')">${s}</button>`).join('')}</div><span class="gv-label">toplam saat</span><input type="number" min="0" max="24" step="0.5" class="gv-input gv-input-sm" value="${u.saat??''}" oninput="gvUn('saat',this.value)"><span class="gv-label">düzen</span><div class="gv-row"><button class="gv-opt ${u.aralikli===false?'aktif':''}" onclick="gvUb('aralikli',false)">aralıksız</button><button class="gv-opt ${u.aralikli===true?'aktif':''}" onclick="gvUb('aralikli',true)">aralıklı</button></div>`;}
function gvUs(k,v){if(!gv.uyku)gv.uyku={};gv.uyku[k]=gv.uyku[k]===v?null:v;gvCiz();gvKayitGec();}
function gvUn(k,v){if(!gv.uyku)gv.uyku={};gv.uyku[k]=v===''?null:parseFloat(v);gvKayitGec();}
function gvUb(k,v){if(!gv.uyku)gv.uyku={};gv.uyku[k]=gv.uyku[k]===v?null:v;gvCiz();gvKayitGec();}
function gvCizYemek(){if(!gv.ogunler)gv.ogunler=[];return gv.ogunler.map((o,i)=>`<div class="ogun-karti"><button class="ogun-sil" onclick="gvOS(${i})">[ × ]</button><span class="gv-label">öğün tipi</span><div class="gv-row">${OGUN_TIPLER.map(t=>`<button class="gv-opt ${o.tip===t?'aktif':''}" onclick="gvOSet(${i},'tip','${t}')">${t}</button>`).join('')}</div><span class="gv-label">yer</span><div class="gv-row">${OGUN_YERI.map(y=>`<button class="gv-opt ${o.yer===y?'aktif':''}" onclick="gvOSet(${i},'yer','${y}')">${y}</button>`).join('')}</div><span class="gv-label">miktar</span><div class="gv-row">${OGUN_MIKTAR.map(m=>`<button class="gv-opt ${o.miktar===m?'aktif':''}" onclick="gvOSet(${i},'miktar','${m}')">${m}</button>`).join('')}</div><span class="gv-label">içerik</span><div class="gv-row"><button class="gv-opt ${o.gluten?'aktif':''}" onclick="gvOT(${i},'gluten')">gluten</button><button class="gv-opt ${o.seker?'aktif':''}" onclick="gvOT(${i},'seker')">şeker</button></div><span class="gv-label">besinler</span><div class="gv-row">${ANA_BESIN.map(b=>{const a=(o.besinler||[]).includes(b);return`<button class="gv-opt ${a?'aktif':''}" onclick="gvOBT(${i},'${b}')">${b}</button>`;}).join('')}</div></div>`).join('')+`<button class="gv-opt" style="margin-top:6px" onclick="gvOE()">+ öğün ekle</button>`;}
function gvOE(){gv.ogunler.push({tip:null,yer:null,miktar:null,gluten:false,seker:false,besinler:[]});gvCiz();gvKayitGec();}
function gvOS(i){gv.ogunler.splice(i,1);gvCiz();gvKayitGec();}
function gvOSet(i,k,v){gv.ogunler[i][k]=gv.ogunler[i][k]===v?null:v;gvCiz();gvKayitGec();}
function gvOT(i,k){gv.ogunler[i][k]=!gv.ogunler[i][k];gvCiz();gvKayitGec();}
function gvOBT(i,b){if(!gv.ogunler[i].besinler)gv.ogunler[i].besinler=[];const l=gv.ogunler[i].besinler,idx=l.indexOf(b);if(idx>=0)l.splice(idx,1);else l.push(b);gvCiz();gvKayitGec();}
function gvCizIcecek(){const ic=gv.icecek||{},alk=ic.alkol||{};return`<span class="gv-label">kafein saatleri</span><input type="text" class="gv-input" placeholder="8, 14, 16" value="${(ic.kafein_saatleri||[]).join(', ')}" oninput="gvKafein(this.value)"><span class="gv-label">alkol</span><div class="gv-row"><button class="gv-opt ${alk.var===false?'aktif':''}" onclick="gvAlk(false)">yok</button><button class="gv-opt ${alk.var===true?'aktif':''}" onclick="gvAlk(true)">var</button></div>${alk.var?`<span class="gv-label">kadeh sayısı</span><input type="number" min="0" max="20" class="gv-input gv-input-sm" value="${alk.miktar??''}" oninput="gvAlkM(this.value)">`:''}  <span class="gv-label">su (bardak)</span><input type="number" min="0" max="30" class="gv-input gv-input-sm" value="${ic.su??''}" oninput="gvSu(this.value)">`;}
function gvKafein(v){if(!gv.icecek)gv.icecek={};gv.icecek.kafein_saatleri=v.split(',').map(s=>s.trim()).filter(Boolean).map(Number).filter(n=>!isNaN(n));gvKayitGec();}
function gvAlk(b){if(!gv.icecek)gv.icecek={};if(!gv.icecek.alkol)gv.icecek.alkol={};gv.icecek.alkol.var=gv.icecek.alkol.var===b?null:b;gvCiz();gvKayitGec();}
function gvAlkM(v){if(!gv.icecek.alkol)gv.icecek.alkol={};gv.icecek.alkol.miktar=v===''?null:parseInt(v);gvKayitGec();}
function gvSu(v){if(!gv.icecek)gv.icecek={};gv.icecek.su=v===''?null:parseInt(v);gvKayitGec();}
function gvCizSpor(){const sp=gv.spor||{};return`<span class="gv-label">seviye</span><div class="gv-row">${SPOR_SEV.map(s=>`<button class="gv-opt ${sp.seviye===s?'aktif':''}" onclick="gvSpor('${s}')">${s}</button>`).join('')}<button class="gv-opt" onclick="gvSporT()">temizle</button></div><span class="gv-label">süre (dk)</span><input type="number" min="0" max="600" class="gv-input gv-input-sm" value="${sp.sure??''}" oninput="gvSporS(this.value)">`;}
function gvSpor(s){if(!gv.spor)gv.spor={};gv.spor.seviye=gv.spor.seviye===s?null:s;gvCiz();gvKayitGec();}
function gvSporS(v){if(!gv.spor)gv.spor={};gv.spor.sure=v===''?null:parseInt(v);gvKayitGec();}
function gvSporT(){gv.spor={};gvCiz();gvKayitGec();}
function gvCizSaglik(){const sg=gv.saglik||{},aci=sg.aci||{},agri=sg.agri||{};const bb=(tp,b,al)=>`<button class="gv-opt ${al.includes(b)?'aktif':''}" onclick="gvSB('${tp}','${b}')">${b}</button>`;return`<span class="gv-label">acı (ani)</span><div class="gv-row"><button class="gv-opt ${aci.var===false?'aktif':''}" onclick="gvSV('aci',false)">yok</button><button class="gv-opt ${aci.var===true?'aktif':''}" onclick="gvSV('aci',true)">var</button></div>${aci.var?`<span class="gv-label">bölge</span><div class="gv-row">${AGRI_BOLGE.map(b=>bb('aci',b,aci.bolge||[])).join('')}</div><span class="gv-label">şiddet: ${aci.siddet||1}</span><input type="range" min="1" max="10" value="${aci.siddet||1}" oninput="gvSS('aci',this.value)" style="width:100%;accent-color:var(--gold)">`:''}  <span class="gv-label">ağrı (sürekli)</span><div class="gv-row"><button class="gv-opt ${agri.var===false?'aktif':''}" onclick="gvSV('agri',false)">yok</button><button class="gv-opt ${agri.var===true?'aktif':''}" onclick="gvSV('agri',true)">var</button></div>${agri.var?`<span class="gv-label">bölge</span><div class="gv-row">${AGRI_BOLGE.map(b=>bb('agri',b,agri.bolge||[])).join('')}</div><span class="gv-label">şiddet: ${agri.siddet||1}</span><input type="range" min="1" max="10" value="${agri.siddet||1}" oninput="gvSS('agri',this.value)" style="width:100%;accent-color:var(--gold)">`:''}  <span class="gv-label">not</span><textarea class="gv-input" rows="2" oninput="gvSN(this.value)">${(sg.not||'')}</textarea>`;}
function gvSV(k,b){if(!gv.saglik)gv.saglik={};if(!gv.saglik[k])gv.saglik[k]={};gv.saglik[k].var=gv.saglik[k].var===b?null:b;if(!gv.saglik[k].var){gv.saglik[k].bolge=[];gv.saglik[k].siddet=null;}gvCiz();gvKayitGec();}
function gvSB(k,b){if(!gv.saglik[k].bolge)gv.saglik[k].bolge=[];const l=gv.saglik[k].bolge,idx=l.indexOf(b);if(idx>=0)l.splice(idx,1);else l.push(b);gvCiz();gvKayitGec();}
function gvSS(k,v){if(!gv.saglik[k])gv.saglik[k]={};gv.saglik[k].siddet=parseInt(v);document.getElementById('acc-ic-saglik').innerHTML=gvCizSaglik();gvKayitGec();}
function gvSN(v){if(!gv.saglik)gv.saglik={};gv.saglik.not=v;gvKayitGec();}
function gvCizEkran(){const e=gv.ekran||{},film=e.film||{},oyun=e.oyun||{};return`<span class="gv-label">film / dizi</span><div class="gv-row"><button class="gv-opt ${film.var===false?'aktif':''}" onclick="gvEV('film',false)">yok</button><button class="gv-opt ${film.var===true?'aktif':''}" onclick="gvEV('film',true)">var</button></div>${film.var?`<span class="gv-label">saat</span><input type="number" min="0" max="24" step="0.5" class="gv-input gv-input-sm" value="${film.saat??''}" oninput="gvES('film',this.value)">`:''}  <span class="gv-label">oyun</span><div class="gv-row"><button class="gv-opt ${oyun.var===false?'aktif':''}" onclick="gvEV('oyun',false)">yok</button><button class="gv-opt ${oyun.var===true?'aktif':''}" onclick="gvEV('oyun',true)">var</button></div>${oyun.var?`<span class="gv-label">saat</span><input type="number" min="0" max="24" step="0.5" class="gv-input gv-input-sm" value="${oyun.saat??''}" oninput="gvES('oyun',this.value)">`:''}  `;}
function gvEV(k,b){if(!gv.ekran)gv.ekran={};if(!gv.ekran[k])gv.ekran[k]={};gv.ekran[k].var=gv.ekran[k].var===b?null:b;if(!gv.ekran[k].var)gv.ekran[k].saat=null;gvCiz();gvKayitGec();}
function gvES(k,v){if(!gv.ekran[k])gv.ekran[k]={};gv.ekran[k].saat=v===''?null:parseFloat(v);gvKayitGec();}
function gvCizSosyal(){const s=gv.sosyal||{};const ni=(lbl,al,mx)=>`<span class="gv-label">${lbl}</span><input type="number" min="0" max="${mx}" step="0.5" class="gv-input gv-input-sm" value="${s[al]??''}" oninput="gvSos('${al}',this.value)">`;return ni('sosyal saat','sosyal_saat',24)+ni('yalnız saat','yalniz_saat',24)+ni('evde saat','evde_saat',24)+ni('görüşülen kişi','kisi_gorusulen',50)+ni('iletişim kurulan','kisi_iletisim',50)+`<span class="gv-label">sosyal amaç</span><div class="gv-row">${['iş','dinlenme','eğlence'].map(a=>`<button class="gv-opt ${s.amac===a?'aktif':''}" onclick="gvSosA('${a}')">${a}</button>`).join('')}</div>`;}
function gvSos(k,v){if(!gv.sosyal)gv.sosyal={};gv.sosyal[k]=v===''?null:parseFloat(v);gvKayitGec();}
function gvSosA(a){if(!gv.sosyal)gv.sosyal={};gv.sosyal.amac=gv.sosyal.amac===a?null:a;gvCiz();gvKayitGec();}

// =====================================================================
// ANALİZ MOTOR
// =====================================================================
const SONUC_ONK=['duygu=','enerji=','aci_var','aci_bolge=','aci_siddet_','uyku_saat_','uyku_aralikli'];
const BLOK_PRF={aci:['aci_var','aci_bolge=','aci_siddet_'],uyku:['uyku_saat_','uyku_yatis=','uyku_kalkis=','uyku_aralikli'],alkol:['alkol_var','alkol_miktar_','secim_beslenme=alkol'],ogun:['ogun_sayisi_','ogun_gluten_var','ogun_seker_var','ogun_disarida_var','ogun_agir_var','ogun_hepsi_hafif'],kafein:['kafein_adet_','kafein_gec'],spor:['spor_seviye=','spor_yapildi','spor_sure_'],film:['film_var','film_saat_'],sosyal:['sosyal_sosyal_saat_','sosyal_yalniz_saat_','sosyal_evde_saat_','sosyal_kisi_gorusulen_','sosyal_kisi_iletisim_','sosyal_amac='],secim_bes:['secim_beslenme='],besin:['besin='],su:['su_bardak_'],duygu:['duygu='],enerji:['enerji=']};
const PEN_ET={T:'aynı gün','T-1':'ertesi gün','T-3':'son 3 gün içinde','T-7c':'haftalık birikim (7g 4+)'};
function ozBlogu(ad){for(const[b,ps]of Object.entries(BLOK_PRF))for(const p of ps)if(ad===p||ad.startsWith(p))return b;return null;}
function sonucMu(ad){return SONUC_ONK.some(p=>ad===p.replace('=','')||ad.startsWith(p));}
function nedenMu(ad){return !sonucMu(ad);}
function gunOzCikar(row){
  const oz={};const uyku=row.uyku||{},ogunler=Array.isArray(row.ogunler)?row.ogunler:[],ic=row.icecek||{},sp=row.spor||{},sg=row.saglik||{},ek=row.ekran||{},so=row.sosyal||{};
  if(uyku.saat!=null)oz['uyku_saat']=parseFloat(uyku.saat);
  if(uyku.yatis)oz[`uyku_yatis=${uyku.yatis}`]=true;
  if(uyku.kalkis)oz[`uyku_kalkis=${uyku.kalkis}`]=true;
  if(uyku.aralikli===true)oz['uyku_aralikli']=true;
  if(ogunler.length>0){oz['ogun_sayisi']=ogunler.length;if(ogunler.filter(o=>o.gluten).length>0)oz['ogun_gluten_var']=true;if(ogunler.filter(o=>o.seker).length>0)oz['ogun_seker_var']=true;if(ogunler.filter(o=>o.yer==='dışarıda').length>0)oz['ogun_disarida_var']=true;if(ogunler.filter(o=>o.miktar==='ağır').length>0)oz['ogun_agir_var']=true;if(ogunler.every(o=>o.miktar==='hafif'))oz['ogun_hepsi_hafif']=true;const bs=new Set();for(const o of ogunler)for(const b of(o.besinler||[]))bs.add(b);for(const b of bs)oz[`besin=${b}`]=true;}
  const alk=ic.alkol||{};if(alk.var===true){oz['alkol_var']=true;if(alk.miktar!=null)oz['alkol_miktar']=parseFloat(alk.miktar);}
  if(ic.su!=null)oz['su_bardak']=parseFloat(ic.su);
  const kaf=Array.isArray(ic.kafein_saatleri)?ic.kafein_saatleri:[];if(kaf.length>0){oz['kafein_adet']=kaf.length;if(kaf.some(s=>s>=16))oz['kafein_gec']=true;}
  if(sp.seviye){oz[`spor_seviye=${sp.seviye}`]=true;oz['spor_yapildi']=true;}
  if(sp.sure!=null)oz['spor_sure']=parseFloat(sp.sure);
  const aci=sg.aci||{};if(aci.var===true){oz['aci_var']=true;if(aci.siddet!=null)oz['aci_siddet']=parseFloat(aci.siddet);for(const b of(aci.bolge||[]))oz[`aci_bolge=${b}`]=true;}
  const film=(ek.film)||{};if(film.var===true){oz['film_var']=true;if(film.saat!=null)oz['film_saat']=parseFloat(film.saat);}
  for(const k of['sosyal_saat','yalniz_saat','evde_saat','kisi_gorusulen','kisi_iletisim'])if(so[k]!=null)oz[`sosyal_${k}`]=parseFloat(so[k]);
  if(so.amac)oz[`sosyal_amac=${so.amac}`]=true;
  return oz;
}
function secimEkle(oz,sec){if(!sec)return;if(sec.duygu)oz[`duygu=${sec.duygu}`]=true;if(sec.enerji)oz[`enerji=${sec.enerji}`]=true;for(const b of(sec.beslenme||[]))oz[`secim_beslenme=${b}`]=true;}
function tertil(vals){if(!vals.length)return[null,null];const s=[...vals].sort((a,b)=>a-b);return[s[Math.floor(s.length/3)],s[Math.floor(2*s.length/3)]];}
function sayisalTertile(gunler){
  const sn={};for(const[,oz]of gunler)for(const[k,v]of Object.entries(oz))if(typeof v==='number'){if(!sn[k])sn[k]=[];sn[k].push(v);}
  const es={};for(const[k,vs]of Object.entries(sn))if(vs.length>=9)es[k]=tertil(vs);
  for(const[,oz]of gunler)for(const k of Object.keys(oz))if(typeof oz[k]==='number'){if(es[k]){const v=oz[k],[alt,ust]=es[k];if(v<=alt)oz[`${k}_az`]=true;else if(v>=ust)oz[`${k}_cok`]=true;else oz[`${k}_orta`]=true;}delete oz[k];}
  return[gunler,es];
}
function pencereler(gunler){
  const gM=Object.fromEntries(gunler),sir=Object.keys(gM).sort(),pen={};
  for(let i=0;i<sir.length;i++){const t=sir[i],p={T:new Set(Object.keys(gM[t]))};if(i>=1){const t1=sir[i-1];if((new Date(t)-new Date(t1))/86400000===1)p['T-1']=new Set(Object.keys(gM[t1]));}const s3=new Set();for(let j=Math.max(0,i-3);j<i;j++)for(const k of Object.keys(gM[sir[j]]))s3.add(k);if(s3.size>0)p['T-3']=s3;const sc={};for(let j=Math.max(0,i-7);j<i;j++)for(const k of Object.keys(gM[sir[j]]))sc[k]=(sc[k]||0)+1;const s7=new Set(Object.entries(sc).filter(([,c])=>c>=4).map(([k])=>k));if(s7.size>0)p['T-7c']=s7;pen[t]=p;}
  return pen;
}
async function analiz2Tara(minOrnek=5){
  const[gvAll,secAll]=await Promise.all([IDB.getAll('gun_verileri'),IDB.getAll('secimler')]);
  const sMap=Object.fromEntries(secAll.map(s=>[s.tarih,s]));
  let gunler=[];
  for(const row of gvAll){const oz=gunOzCikar(row);secimEkle(oz,sMap[row.tarih]);if(Object.keys(oz).length>0)gunler.push([row.tarih,oz]);}
  for(const s of secAll){if(gunler.some(([t])=>t===s.tarih))continue;const oz={};secimEkle(oz,s);if(Object.keys(oz).length>0)gunler.push([s.tarih,oz]);}
  gunler.sort((a,b)=>a[0].localeCompare(b[0]));
  if(gunler.length<minOrnek*2)return{bulgular:[],uyari:'yetersiz veri',gun_sayisi:gunler.length};
  let es;[gunler,es]=sayisalTertile(gunler);
  const pen=pencereler(gunler);
  const tumOz=new Set();for(const[,oz]of gunler)for(const k of Object.keys(oz))tumOz.add(k);
  const fakt=[...tumOz].sort(),sonuclar=fakt.filter(o=>sonucMu(o)),nedenler=fakt.filter(o=>nedenMu(o));
  const gM=Object.fromEntries(gunler.map(([t,oz])=>[t,new Set(Object.keys(oz))]));
  const bulgular=[];
  for(const sonuc of sonuclar)for(const pen_ad of['T','T-1','T-3','T-7c'])for(const faktor of nedenler){
    if(faktor===sonuc)continue;
    if(pen_ad==='T'){const fb=ozBlogu(faktor),sb=ozBlogu(sonuc);if(fb&&fb===sb)continue;}
    let fvSv=0,fvSy=0,fySv=0,fyYy=0;
    for(const[tarih,sSet]of Object.entries(gM)){const p=pen[tarih]||{},fS=p[pen_ad];if(!fS)continue;const fv=fS.has(faktor),sv=sSet.has(sonuc);if(fv&&sv)fvSv++;else if(fv&&!sv)fvSy++;else if(!fv&&sv)fySv++;else fyYy++;}
    const nF=fvSv+fvSy,nY=fySv+fyYy;if(nF<minOrnek||nY<minOrnek)continue;
    const pF=fvSv/nF,pY=fySv/nY;
    bulgular.push({faktor,sonuc,pencere:pen_ad,pencere_etiket:PEN_ET[pen_ad],n_faktor:nF,n_sonuc_faktorle:fvSv,yuzde:Math.round(pF*1000)/10,karsi_yuzde:Math.round(pY*1000)/10,fark:Math.round((pF-pY)*1000)/10});
  }
  for(const b of bulgular)b.guc_skoru=Math.round(b.fark*Math.log10(b.n_faktor+1)*100)/100;
  bulgular.sort((a,b)=>b.guc_skoru-a.guc_skoru||(b.fark-a.fark));
  const fsIdx=new Map();for(let i=0;i<bulgular.length;i++){const b=bulgular[i],k=`${b.faktor}|${b.sonuc}`;if(!fsIdx.has(k)||bulgular[fsIdx.get(k)].guc_skoru<b.guc_skoru)fsIdx.set(k,i);}
  for(const b of bulgular){const ka=[];for(const a of bulgular){if(a.sonuc!==b.faktor)continue;const k2=`${a.faktor}|${b.sonuc}`;if(!fsIdx.has(k2))continue;const k2b=bulgular[fsIdx.get(k2)];if(ka.some(x=>x.faktor===a.faktor))continue;ka.push({faktor:a.faktor,kok_to_faktor_yuzde:a.yuzde,kok_to_faktor_n:a.n_faktor,kok_to_sonuc_yuzde:k2b.yuzde,kok_to_sonuc_n:k2b.n_faktor,ortak_guc:Math.round(Math.min(a.yuzde,k2b.yuzde)*10)/10});}ka.sort((a,b)=>b.ortak_guc-a.ortak_guc);b.olasi_kok_nedenler=ka.slice(0,5);}
  return{bulgular,gun_sayisi:gunler.length,faktor_sayisi:fakt.length,sonuc_sayisi:sonuclar.length};
}

function zincirBul(bulgular){
  if(bulgular.length<2)return[];
  const enIyi=new Map();for(const b of bulgular){const k=b.faktor+'|'+b.sonuc;if(!enIyi.has(k)||enIyi.get(k).guc_skoru<b.guc_skoru)enIyi.set(k,b);}
  const kenarlar=[...enIyi.values()];const adj=new Map();for(const b of kenarlar){if(!adj.has(b.faktor))adj.set(b.faktor,[]);adj.get(b.faktor).push(b);}
  let enIyiYol=[],enIyiGuc=-Infinity;
  function dfs(d,yol,guc,ziy){if(yol.length>enIyiYol.length||(yol.length===enIyiYol.length&&guc>enIyiGuc)){enIyiYol=[...yol];enIyiGuc=guc;}if(yol.length>=6)return;const dev=(adj.get(d)||[]).filter(b=>!ziy.has(b.sonuc)).sort((a,b)=>b.guc_skoru-a.guc_skoru).slice(0,4);for(const b of dev){ziy.add(b.sonuc);dfs(b.sonuc,[...yol,b],guc+b.guc_skoru,ziy);ziy.delete(b.sonuc);}}
  const tum=new Set(kenarlar.flatMap(b=>[b.faktor,b.sonuc]));for(const d of tum)dfs(d,[],0,new Set([d]));
  if(enIyiYol.length>=2){const ilk=enIyiYol[0].faktor,son=enIyiYol[enIyiYol.length-1].sonuc;const don=kenarlar.find(b=>b.faktor===son&&b.sonuc===ilk);if(don)enIyiYol.push({...don,isDongu:true});}
  return enIyiYol;
}
function zincirCiz(zincir){
  if(!zincir.length)return'';
  const parcalar=[];
  function ren(b){if(b.isDongu)return'dongu';if(b.fark>=40)return'guclu';if(b.fark>=20)return'orta';return'hafif';}
  parcalar.push(`<div class="zincir-kutu ${ren(zincir[0])}">${a2TR(zincir[0].faktor)}</div>`);
  for(const b of zincir){const ok=b.isDongu?'↩':'→';parcalar.push(`<div><span class="zincir-ok">${ok}</span>${b.isDongu?'':` <span class="zincir-yuzde">%${b.yuzde}</span>`}</div>`);parcalar.push(`<div class="zincir-kutu ${ren(b)}">${a2TR(b.sonuc)}${b.isDongu?' ↩':''}</div>`);}
  return parcalar.join('');
}
function zincirOzet(zincir){
  if(!zincir.length)return'';
  const adimlar=[a2TR(zincir[0].faktor),...zincir.map(b=>a2TR(b.sonuc))];
  const dongu=zincir.some(b=>b.isDongu);
  const gucOrt=Math.round(zincir.reduce((s,b)=>s+b.fark,0)/zincir.length);
  let m=`en güçlü zincir: ${adimlar.slice(0,-1).join(' → ')}.`;
  m+=dongu?' bu bir döngü — son halka başa dönüyor. zincirin bir halkasını kırmadan sistem kendini besliyor.'  :' bu tek yönlü bir zincir — başı değiştirmek sonu etkiler.';
  m+=` ort. etki farkı: %${gucOrt}.`;
  const enZ=[...zincir].filter(b=>!b.isDongu).sort((a,b)=>a.guc_skoru-b.guc_skoru)[0];
  if(enZ)m+=` en zayıf halka: "${a2TR(enZ.faktor)}" → "${a2TR(enZ.sonuc)}" (%${enZ.yuzde}). buradan başlamak en kolay müdahale noktası.`;
  return m;
}
function zincirGuncelle(bulgular){
  const bolum=document.getElementById('zincirBolum');
  const zincir=zincirBul(bulgular);
  if(zincir.length<2){bolum.style.display='none';return;}
  bolum.style.display='block';
  document.getElementById('zincirGorsel').innerHTML=zincirCiz(zincir);
  document.getElementById('zincirOzet').textContent=zincirOzet(zincir);
  const dongu=zincir.some(b=>b.isDongu);
  document.getElementById('donguRozet').textContent=dongu?'döngü tespit edildi':zincir.length+' halka';
}

async function analiz2Goster(){
  const modal=document.getElementById('analiz2Modal'); modal.classList.remove('hidden');
  const liste=document.getElementById('bulgularListe'),ozet=document.getElementById('analiz2Ozet');
  liste.innerHTML='<div style="text-align:center;padding:40px;font-size:11px;color:var(--text3)">taranıyor_</div>'; ozet.textContent='yükleniyor_';
  try{
    const d=await analiz2Tara(parseInt(document.getElementById('a2Ornek').value)||5);
    if(d.uyari){liste.innerHTML=`<div style="text-align:center;padding:40px;font-size:11px;color:var(--text3)">${d.uyari} (${d.gun_sayisi||0} günlük veri)</div>`;ozet.textContent='';return;}
    A2_BULGULAR=d.bulgular||[];
    ozet.textContent=`${d.gun_sayisi} gün · ${d.faktor_sayisi} faktör × ${d.sonuc_sayisi} sonuç · ${A2_BULGULAR.length} bulgu`;
    analiz2Filtrele();
  }catch(e){liste.innerHTML=`<div style="text-align:center;padding:40px;font-size:11px;color:var(--red)">${e.message}</div>`;console.error(e);}
}
function a2PencereSec(p){A2_PENCERE=p;document.querySelectorAll('[data-p]').forEach(b=>b.classList.toggle('aktif',b.dataset.p===p));analiz2Filtrele();}
function a2SonucSec(s){A2_SONUC=s;document.querySelectorAll('[data-s]').forEach(b=>b.classList.toggle('aktif',b.dataset.s===s));analiz2Filtrele();}
function a2SonucEsle(sonuc,f){if(f==='hepsi')return true;if(f==='duygu')return sonuc.startsWith('duygu=');if(f==='enerji')return sonuc.startsWith('enerji=');if(f==='aci')return sonuc.startsWith('aci_');if(f==='uyku')return sonuc.startsWith('uyku_');return true;}
function analiz2Filtrele(){
  const minY=parseInt(document.getElementById('a2Yuzde').value),minO=parseInt(document.getElementById('a2Ornek').value),minK=parseInt(document.getElementById('a2Kok').value);
  document.getElementById('a2YuzdeVal').textContent='%'+minY; document.getElementById('a2OrnekVal').textContent=minO; document.getElementById('a2KokVal').textContent='%'+minK;
  A2_MIN_KOK=minK;
  let f=A2_BULGULAR.filter(b=>b.yuzde>=minY&&b.n_faktor>=minO&&(A2_PENCERE==='hepsi'||b.pencere===A2_PENCERE)&&a2SonucEsle(b.sonuc,A2_SONUC));
  const enIyi=new Map();for(const b of f){const k=`${b.faktor}|${b.sonuc}`;if(!enIyi.has(k)||enIyi.get(k).guc_skoru<b.guc_skoru)enIyi.set(k,b);}
  f=[...enIyi.values()].sort((a,b)=>b.guc_skoru-a.guc_skoru);
  document.getElementById('a2Sayac').textContent=f.length+' bulgu';
  document.getElementById('bulgularListe').innerHTML=f.length?f.map(bulguKartCiz).join(''):'<div style="text-align:center;padding:40px;font-size:11px;color:var(--text3)">bu eşikte bulgu yok — sliderleri gevşet_</div>';
  zincirGuncelle(A2_BULGULAR.length>0?A2_BULGULAR:f);
}
function a2TR(s){
  const tr={'uyku_saat_az':'az uyku','uyku_saat_orta':'orta uyku','uyku_saat_cok':'çok uyku','uyku_aralikli':'aralıklı uyku','alkol_var':'alkol (kayıt)','secim_beslenme=alkol':'alkol (seçim)','kafein_gec':'geç kafein','aci_var':'ağrı/acı var','spor_yapildi':'spor yapıldı','film_var':'film izlendi','ogun_gluten_var':'glutenli öğün','ogun_seker_var':'şekerli öğün','ogun_disarida_var':'dışarıda yemek','ogun_agir_var':'ağır öğün','ogun_hepsi_hafif':'tüm öğünler hafif'};
  if(tr[s])return tr[s];
  if(s.includes('=')){const[k,v]=s.split('=');const kt={duygu:'duygu',enerji:'enerji',aci_bolge:'ağrı bölgesi',uyku_yatis:'yatış',uyku_kalkis:'kalkış',spor_seviye:'spor seviyesi',sosyal_amac:'sosyal amaç',besin:'besin',secim_beslenme:'beslenme'}[k]||k;return`${kt}: ${v}`;}
  return s.replace(/_/g,' ');
}
function bulguKartCiz(b){
  const farkSinif=b.fark>=40?'guclu':b.fark>=20?'orta':'hafif';
  const penSinif=b.pencere.replace('-','').replace('7c','7c');
  const kokler=(b.olasi_kok_nedenler||[]).filter(k=>k.ortak_guc>=A2_MIN_KOK);
  return`<div class="bulgu-kart"><div class="bulgu-ust"><span class="bulgu-pencere ${penSinif}">${b.pencere_etiket}</span><span class="bulgu-fark ${farkSinif}">+${b.fark}</span><span class="bulgu-guc">güç: ${b.guc_skoru}</span></div><div class="bulgu-ifade"><span class="faktor">${a2TR(b.faktor)}</span><span class="ok">→</span><span class="sonuc">${a2TR(b.sonuc)}</span></div><div class="bulgu-istat">${b.n_faktor} kayıttan ${b.n_sonuc_faktorle}'inde (<strong>%${b.yuzde}</strong>) bu sonuç var. karşı grup: %${b.karsi_yuzde}.</div>${kokler.length?`<div class="kok-bolum"><div class="kok-label">olası kök neden</div>${kokler.map(k=>`<div class="kok-satir"><span class="kok-faktor">${a2TR(k.faktor)}</span><span>→ ${a2TR(b.faktor)} (%${k.kok_to_faktor_yuzde})</span><span>→ ${a2TR(b.sonuc)} (%${k.kok_to_sonuc_yuzde})</span><span class="kok-guc">${k.ortak_guc}</span></div>`).join('')}</div>`:''}</div>`;
}
